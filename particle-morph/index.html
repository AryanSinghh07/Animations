<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Particle Morph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
  canvas { display: block; cursor: none; }

  /* ── UI LAYER ── */
  #ui {
    position: fixed; inset: 0;
    pointer-events: none;
    font-family: 'Inter', sans-serif;
    z-index: 10;
  }

  /* shape name badge */
  #badge {
    position: absolute;
    top: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
  }
  #badge-name {
    font-size: .65rem;
    font-weight: 300;
    letter-spacing: .5em;
    text-transform: uppercase;
    color: rgba(255, 210, 140, 0);
    transition: color .5s ease;
  }
  #badge-name.visible { color: rgba(255, 210, 140, .75); }
  #badge-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,190,80,.5), transparent);
    transition: width .8s ease;
  }
  #badge-line.visible { width: 120px; }

  /* bottom hint */
  #hint {
    position: absolute;
    bottom: 2.2rem; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 1.8rem;
  }
  .hint-item {
    display: flex; align-items: center; gap: .5rem;
    color: rgba(255, 200, 120, .35);
    font-size: .6rem;
    font-weight: 300;
    letter-spacing: .2em;
    text-transform: uppercase;
    animation: breathe 3s ease-in-out infinite;
  }
  .hint-item:nth-child(2) { animation-delay: 1.5s; }
  .dot { width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,190,80,.4); flex-shrink: 0; }
  @keyframes breathe {
    0%, 100% { opacity: .35; }
    50% { opacity: .8; }
  }

  /* shape counter dots */
  #dots {
    position: absolute;
    right: 2.5rem; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: .65rem;
  }
  .sdot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,180,80,.2);
    transition: background .4s ease, transform .4s ease;
    border: 1px solid rgba(255,180,80,.2);
  }
  .sdot.active {
    background: rgba(255,200,100,.8);
    box-shadow: 0 0 6px rgba(255,180,60,.6);
    transform: scale(1.4);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="badge">
    <div id="badge-name">Idle</div>
    <div id="badge-line"></div>
  </div>
  <div id="hint">
    <span class="hint-item"><span class="dot"></span>Move to repel</span>
    <span class="hint-item"><span class="dot"></span>Click to morph</span>
  </div>
  <div id="dots"></div>
</div>

<!-- GSAP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const COUNT   = 3500;   // particle count (crisp, not too dense)
const REPEL_R = 120;    // mouse repel radius px
const REPEL_F = 2.2;    // repel peak strength
const IDLE_D  = 0.94;   // idle velocity damping
const IDLE_W  = 0.018;  // idle brownian wander
const IDLE_R  = 280;    // idle cloud radius
const AUTO_ROT= 0.00013;// auto-rotation rad/ms

// ══════════════════════════════════════════════════════════════
//  PALETTE  — gold, rose, champagne
// ══════════════════════════════════════════════════════════════
const PALETTE = [
  [255, 213,  60],   // gold
  [255, 165, 100],   // amber
  [255, 120, 150],   // rose
  [255, 245, 210],   // champagne
];
function getColor(t) {
  const s = (PALETTE.length - 1) * t;
  const i = Math.min(Math.floor(s), PALETTE.length - 2);
  const f = s - i;
  const a = PALETTE[i], b = PALETTE[i + 1];
  return [
    a[0] + (b[0] - a[0]) * f | 0,
    a[1] + (b[1] - a[1]) * f | 0,
    a[2] + (b[2] - a[2]) * f | 0,
  ];
}

// ══════════════════════════════════════════════════════════════
//  SHAPE GENERATORS  — return array of {x,y,z}
// ══════════════════════════════════════════════════════════════
function genSphere(n) {
  const pts = [];
  const gr = (Math.sqrt(5) - 1) / 2;
  for (let i = 0; i < n; i++) {
    const theta = 2 * Math.PI * i * gr;
    const phi   = Math.acos(1 - 2 * (i + .5) / n);
    const R = 160;
    pts.push({
      x: R * Math.sin(phi) * Math.cos(theta),
      y: R * Math.cos(phi),
      z: R * Math.sin(phi) * Math.sin(theta),
    });
  }
  return pts;
}

function genTorusKnot(n) {
  const pts = [], p = 2, q = 3, R = 85;
  for (let i = 0; i < n; i++) {
    const t = (i / n) * Math.PI * 2 * p;
    const r = Math.cos(q * t / p) + 2.4;
    pts.push({
      x: r * Math.cos(t) * R,
      y: r * Math.sin(t) * R,
      z: -Math.sin(q * t / p) * R,
    });
  }
  return pts;
}

function genRing(n) {
  const pts = [], rings = 3;
  const perRing = Math.floor(n / rings);
  const radii = [180, 120, 60];
  for (let r = 0; r < rings; r++) {
    const R = radii[r], cnt = r === rings - 1 ? n - perRing * r : perRing;
    const yOff = (r - 1) * 0;
    for (let i = 0; i < cnt; i++) {
      const a = (i / cnt) * Math.PI * 2;
      pts.push({ x: Math.cos(a) * R, y: yOff + (Math.random() - .5) * 8, z: Math.sin(a) * R });
    }
  }
  return pts;
}

function genDNA(n) {
  const pts = [], height = 380;
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const angle = t * Math.PI * 14;
    const strand = i % 2;
    const phase  = strand * Math.PI;
    const R = 72;
    pts.push({
      x: Math.cos(angle + phase) * R,
      y: (t - .5) * height,
      z: Math.sin(angle + phase) * R,
    });
  }
  return pts;
}

function genFlower(n) {
  const pts = [];
  const PETALS = 6;
  const petalN  = Math.floor(n * .72);
  const centreN = n - petalN;
  // petals
  for (let i = 0; i < petalN; i++) {
    const t   = i / petalN;
    const p   = Math.floor(t * PETALS);
    const u   = (t * PETALS) % 1;
    const ang = (p / PETALS) * Math.PI * 2;
    const R   = Math.sin(u * Math.PI) * 148;
    const Y   = -Math.sin(u * Math.PI) * 65 + Math.cos(u * Math.PI * 1.6) * 18;
    pts.push({
      x: Math.cos(ang) * R,
      y: Y,
      z: Math.sin(ang) * R,
    });
  }
  // centre dome
  for (let i = 0; i < centreN; i++) {
    const phi   = Math.random() * Math.PI * .45;
    const theta = Math.random() * Math.PI * 2;
    const r = 22;
    pts.push({
      x: r * Math.sin(phi) * Math.cos(theta),
      y: -r * Math.cos(phi),
      z: r * Math.sin(phi) * Math.sin(theta),
    });
  }
  return pts;
}

const SHAPES = [
  { name: 'Sphere',       gen: genSphere },
  { name: 'Flower',       gen: genFlower },
  { name: 'Torus Knot',   gen: genTorusKnot },
  { name: 'DNA Helix',    gen: genDNA },
  { name: 'Orbital Ring', gen: genRing },
];

// ══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d', { alpha: false });

let W, H, cx, cy;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

let mx = 0, my = 0, mouseActive = false;
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; mouseActive = true; });

// ══════════════════════════════════════════════════════════════
//  PARTICLE DATA  (plain objects — GSAP tweens their x/y/z)
// ══════════════════════════════════════════════════════════════
const particles = [];
for (let i = 0; i < COUNT; i++) {
  const r   = IDLE_R * (.3 + Math.random() * .7);
  const phi = Math.random() * Math.PI;
  const th  = Math.random() * Math.PI * 2;
  const p = {
    x:   r * Math.sin(phi) * Math.cos(th),
    y:   r * Math.cos(phi),
    z:   r * Math.sin(phi) * Math.sin(th),
    vx:  (Math.random() - .5) * .5,
    vy:  (Math.random() - .5) * .5,
    vz:  (Math.random() - .5) * .5,
    hx:  r * Math.sin(phi) * Math.cos(th),   // home
    hy:  r * Math.cos(phi),
    hz:  r * Math.sin(phi) * Math.sin(th),
    col: Math.random(),   // [0,1] palette position
    sz:  .55 + Math.random() * .7,
    morphed: false,       // currently gsap-controlled?
  };
  particles.push(p);
}

// ══════════════════════════════════════════════════════════════
//  DOT INDICATORS
// ══════════════════════════════════════════════════════════════
const dotContainer = document.getElementById('dots');
const sdots = [];
for (let i = 0; i < SHAPES.length; i++) {
  const d = document.createElement('div');
  d.className = 'sdot';
  dotContainer.appendChild(d);
  sdots.push(d);
}

// ══════════════════════════════════════════════════════════════
//  MORPH STATE
// ══════════════════════════════════════════════════════════════
let shapeIdx = -1;
let isMorphed = false;
let autoRot   = 0;
let lastTime  = 0;
let cooldown  = false;

const badgeName = document.getElementById('badge-name');
const badgeLine = document.getElementById('badge-line');

function showBadge(name) {
  badgeName.textContent = name;
  badgeName.classList.add('visible');
  badgeLine.classList.add('visible');
  clearTimeout(showBadge._t);
  showBadge._t = setTimeout(() => {
    badgeName.classList.remove('visible');
    badgeLine.classList.remove('visible');
  }, 2200);
}

function morphTo(shapeIndex) {
  const cloud = SHAPES[shapeIndex].gen(COUNT);
  sdots.forEach((d, i) => d.classList.toggle('active', i === shapeIndex));
  showBadge(SHAPES[shapeIndex].name);

  particles.forEach((p, i) => {
    const t = cloud[i % cloud.length];
    p.morphed = true;
    // GSAP tween each particle to its target — silky smooth
    gsap.to(p, {
      x: t.x, y: t.y, z: t.z,
      duration: 1.6 + Math.random() * .6,
      ease: 'expo.inOut',
      delay: Math.random() * .35,
      overwrite: true,
    });
  });
  isMorphed = true;
}

function disperse() {
  sdots.forEach(d => d.classList.remove('active'));
  particles.forEach(p => {
    p.morphed = false;
    gsap.to(p, {
      x: p.hx, y: p.hy, z: p.hz,
      duration: 1.4 + Math.random() * .5,
      ease: 'power3.inOut',
      delay: Math.random() * .25,
      overwrite: true,
    });
  });
  isMorphed = false;
}

function trigger() {
  if (cooldown) return;
  cooldown = true;
  setTimeout(() => cooldown = false, 900);

  if (isMorphed) {
    disperse();
  } else {
    shapeIdx = (shapeIdx + 1) % SHAPES.length;
    morphTo(shapeIdx);
  }
}

canvas.addEventListener('click', trigger);
window.addEventListener('wheel', trigger, { passive: true });

// ══════════════════════════════════════════════════════════════
//  PROJECTION  (3D → screen)
// ══════════════════════════════════════════════════════════════
const FOV  = 540;
const ZOFF = 300;
const TILT = .18;
const cosTilt = Math.cos(TILT), sinTilt = Math.sin(TILT);

function project(px, py, pz) {
  const cY = Math.cos(autoRot), sY = Math.sin(autoRot);
  const rx  = px * cY + pz * sY;
  const ry0 = py;
  const rz0 = -px * sY + pz * cY;
  const ry  = ry0 * cosTilt - rz0 * sinTilt;
  const rz  = ry0 * sinTilt + rz0 * cosTilt;
  const sc  = FOV / (FOV + rz + ZOFF);
  return [cx + rx * sc, cy + ry * sc, sc];
}

// ══════════════════════════════════════════════════════════════
//  RENDER LOOP
// ══════════════════════════════════════════════════════════════
function frame(ts) {
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;
  autoRot += AUTO_ROT * dt;

  // ─ background
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);

  // ─ subtle centre nebula
  const nb = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * .5);
  nb.addColorStop(0,   'rgba(60,20,50,.06)');
  nb.addColorStop(.6,  'rgba(20,5,20,.02)');
  nb.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = nb;
  ctx.fillRect(0, 0, W, H);

  // ─ idle physics (only for non-morphed)
  for (let i = 0; i < COUNT; i++) {
    const p = particles[i];
    if (p.morphed) continue;
    // brownian wander
    p.vx += (Math.random() - .5) * IDLE_W;
    p.vy += (Math.random() - .5) * IDLE_W;
    p.vz += (Math.random() - .5) * IDLE_W;
    // centre gravity
    p.vx -= p.x * .00015;
    p.vy -= p.y * .00015;
    p.vz -= p.z * .00015;
    p.vx *= IDLE_D; p.vy *= IDLE_D; p.vz *= IDLE_D;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
  }

  // ─ mouse repel
  if (mouseActive) {
    for (let i = 0; i < COUNT; i++) {
      const p = particles[i];
      const [sx, sy] = project(p.x, p.y, p.z);
      const dx = sx - mx, dy = sy - my;
      const d2 = dx * dx + dy * dy;
      if (d2 < REPEL_R * REPEL_R && d2 > 1) {
        const d = Math.sqrt(d2);
        const f = ((1 - d / REPEL_R) ** 2) * REPEL_F;
        p.vx += (dx / d) * f * .32;
        p.vy += (dy / d) * f * .32;
      }
    }
  }

  // ─ collect & sort
  const sorted = particles.slice().sort((a, b) => {
    const za = a.z * Math.cos(autoRot) - a.x * Math.sin(autoRot);
    const zb = b.z * Math.cos(autoRot) - b.x * Math.sin(autoRot);
    return za - zb;
  });

  // ─ draw particles
  for (let k = 0; k < COUNT; k++) {
    const p  = sorted[k];
    const [sx, sy, sc] = project(p.x, p.y, p.z);
    if (sx < -40 || sx > W + 40 || sy < -40 || sy > H + 40) continue;

    const [r, g, b] = getColor(p.col);
    const alpha  = Math.min(.98, Math.max(.07, (sc - .38) * 2.0));
    const radius = Math.max(.35, sc * p.sz * 2.6);

    // ── outer soft halo
    const hr = radius * 6;
    const g1 = ctx.createRadialGradient(sx, sy, 0, sx, sy, hr);
    g1.addColorStop(0,    `rgba(${r},${g},${b},${+(alpha * .42).toFixed(3)})`);
    g1.addColorStop(.35,  `rgba(${r},${g},${b},${+(alpha * .12).toFixed(3)})`);
    g1.addColorStop(1,    `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(sx, sy, hr, 0, Math.PI * 2);
    ctx.fillStyle = g1;
    ctx.fill();

    // ── bright core
    const g2 = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius * 2);
    g2.addColorStop(0,   `rgba(255,248,235,${+(alpha * 1.0).toFixed(3)})`);
    g2.addColorStop(.45, `rgba(${r},${g},${b},${+(alpha * .75).toFixed(3)})`);
    g2.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(sx, sy, radius * 2, 0, Math.PI * 2);
    ctx.fillStyle = g2;
    ctx.fill();
  }

  // ─ cursor
  if (mouseActive) {
    // outer ring pulse
    ctx.beginPath();
    ctx.arc(mx, my, 14, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,200,100,.45)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // inner ring
    ctx.beginPath();
    ctx.arc(mx, my, 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,230,160,.7)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // dot
    ctx.beginPath();
    ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,240,200,.95)';
    ctx.fill();
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
