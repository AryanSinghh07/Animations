<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Particle Morph · 4K</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',sans-serif}
  canvas{display:block;width:100%!important;height:100%!important}
  #ui{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:16px;z-index:10;pointer-events:none}
  .pill{pointer-events:all;padding:10px 22px;border-radius:999px;border:1px solid rgba(255,200,100,0.25);background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);color:rgba(255,220,140,0.85);font-size:13px;letter-spacing:.08em;cursor:pointer;transition:all .3s;user-select:none}
  .pill:hover,.pill.active{background:rgba(255,180,60,0.15);border-color:rgba(255,200,100,0.6);color:#ffd87a;box-shadow:0 0 20px rgba(255,180,60,0.2)}
  #hint{position:fixed;top:36px;left:50%;transform:translateX(-50%);color:rgba(255,200,120,0.45);font-size:12px;letter-spacing:.15em;text-transform:uppercase;pointer-events:none;transition:opacity 1s}
  #shape-name{position:fixed;top:36px;right:48px;color:rgba(255,200,120,0.5);font-size:11px;letter-spacing:.2em;text-transform:uppercase;pointer-events:none}
</style>
</head>
<body>
<div id="hint">Move cursor · Click to morph · Scroll to cycle</div>
<div id="shape-name">Idle Cloud</div>
<div id="ui">
  <div class="pill" data-shape="0">Cloud</div>
  <div class="pill active" data-shape="1">Sphere</div>
  <div class="pill" data-shape="2">Torus</div>
  <div class="pill" data-shape="3">Flower</div>
  <div class="pill" data-shape="4">Helix</div>
  <div class="pill" data-shape="5">Galaxy</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
/* ─────────────────────────────────────────────
   CONSTANTS
───────────────────────────────────────────── */
const COUNT   = 12000;
const SPREAD  = 280;
const FOG_COL = 0x000000;
const SHAPE_NAMES = ['Idle Cloud','Sphere','Torus Knot','Rose Flower','DNA Helix','Galaxy Spiral'];

/* ─────────────────────────────────────────────
   SCENE / RENDERER
───────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000000,1);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(FOG_COL, 0.0012);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,.1,3000);
camera.position.set(0,0,520);

/* ─────────────────────────────────────────────
   PARTICLE GEOMETRY  (BufferGeometry)
───────────────────────────────────────────── */
const positions = new Float32Array(COUNT*3);
const colors    = new Float32Array(COUNT*3);
const sizes     = new Float32Array(COUNT);

// Gold-pink palette
const PALETTE = [
  new THREE.Color('#ffd27a'), // warm gold
  new THREE.Color('#ffb347'), // amber
  new THREE.Color('#ff8fa3'), // rose pink
  new THREE.Color('#ffcba4'), // peach
  new THREE.Color('#fff0c0'), // cream
  new THREE.Color('#ff6fa8'), // hot pink
];

for(let i=0;i<COUNT;i++){
  const r = SPREAD*(0.3+0.7*Math.random());
  const θ = Math.random()*Math.PI*2;
  const φ = Math.acos(2*Math.random()-1);
  positions[i*3]  = r*Math.sin(φ)*Math.cos(θ);
  positions[i*3+1]= r*Math.sin(φ)*Math.sin(θ);
  positions[i*3+2]= r*Math.cos(φ)*(Math.random()>.5?1:-1)*0.4;
  const c = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
  sizes[i] = 1.5 + Math.random()*3.5;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('color',    new THREE.BufferAttribute(colors,3));
geo.setAttribute('size',     new THREE.BufferAttribute(sizes,1));

/* ─────────────────────────────────────────────
   GLOW SPRITE TEXTURE  (procedural)
───────────────────────────────────────────── */
function makeSprite(){
  const c=document.createElement('canvas'); c.width=c.height=64;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,  'rgba(255,255,255,1)');
  g.addColorStop(0.15,'rgba(255,240,180,0.9)');
  g.addColorStop(0.4, 'rgba(255,180,100,0.5)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  x.fillStyle=g; x.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

/* ─────────────────────────────────────────────
   SHADER MATERIAL  (custom size + additive)
───────────────────────────────────────────── */
const mat = new THREE.ShaderMaterial({
  uniforms:{
    uTex:   {value: makeSprite()},
    uTime:  {value: 0},
    uMouse: {value: new THREE.Vector3()},
  },
  vertexShader:`
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    uniform float uTime;
    void main(){
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      gl_PointSize = size * (420.0 / -mv.z);
      gl_PointSize = clamp(gl_PointSize, 1.0, 18.0);
      gl_Position  = projectionMatrix * mv;
    }
  `,
  fragmentShader:`
    uniform sampler2D uTex;
    varying vec3 vColor;
    void main(){
      vec4 tex = texture2D(uTex, gl_PointCoord);
      if(tex.a < 0.01) discard;
      gl_FragColor = vec4(vColor * tex.rgb * 1.6, tex.a * 0.92);
    }
  `,
  transparent:true,
  depthWrite:false,
  blending: THREE.AdditiveBlending,
  vertexColors: false,
});

const points = new THREE.Points(geo,mat);
scene.add(points);

/* ─────────────────────────────────────────────
   SHAPE GENERATORS  → return [{x,y,z}×COUNT]
───────────────────────────────────────────── */
function fibSphere(n,R=200){
  const pts=[]; const φ=(1+Math.sqrt(5))/2;
  for(let i=0;i<n;i++){
    const t=i/n; const inc=Math.acos(1-2*t);
    const az=2*Math.PI*i/φ;
    pts.push({x:R*Math.sin(inc)*Math.cos(az),y:R*Math.sin(inc)*Math.sin(az),z:R*Math.cos(inc)});
  }
  return pts;
}

function torusKnot(n,R=140,r=50,p=2,q=3){
  const pts=[];
  for(let i=0;i<n;i++){
    const t=i/n*Math.PI*2;
    const d=R+r*Math.cos(q*t);
    pts.push({x:d*Math.cos(p*t),y:d*Math.sin(p*t),z:r*Math.sin(q*t)});
  }
  return pts;
}

function roseFlower(n){
  const pts=[];
  const petals=6; const R=180; const thick=22;
  for(let i=0;i<n;i++){
    const t=i/n;
    // Petal surface
    const petalIdx = Math.floor(t*petals);
    const pt = (t*petals - petalIdx);
    const angle = (petalIdx/petals)*Math.PI*2;
    const petalR = R*Math.sin(Math.PI*pt);
    const spread = thick*(2*Math.random()-1);
    const x = (petalR+spread)*Math.cos(angle);
    const y = (petalR+spread)*Math.sin(angle);
    const z = R*0.18*Math.sin(Math.PI*pt) - 30 + (Math.random()-0.5)*20;
    pts.push({x,y,z});
  }
  return pts;
}

function dnaHelix(n,R=90,H=340,turns=5){
  const pts=[];
  for(let i=0;i<n;i++){
    const t=i/n;
    const θ=t*Math.PI*2*turns;
    const y=t*H - H/2;
    if(i%2===0){
      pts.push({x:R*Math.cos(θ),y,z:R*Math.sin(θ)});
    } else {
      pts.push({x:R*Math.cos(θ+Math.PI),y,z:R*Math.sin(θ+Math.PI)});
    }
  }
  return pts;
}

function galaxySpiral(n){
  const pts=[]; const arms=3; const R=220; const H=30;
  for(let i=0;i<n;i++){
    const arm=i%arms;
    const t=i/n;
    const r=20+R*Math.pow(t,0.55);
    const θ=(arm/arms)*Math.PI*2 + t*Math.PI*5;
    const scatter=(1-t)*30;
    pts.push({
      x:(r+scatter*(Math.random()-.5))*Math.cos(θ),
      y:(Math.random()-.5)*H*(1-t*0.7),
      z:(r+scatter*(Math.random()-.5))*Math.sin(θ)
    });
  }
  return pts;
}

function cloudIdle(n){
  const pts=[]; const R=SPREAD;
  for(let i=0;i<n;i++){
    const r=R*(0.2+0.8*Math.cbrt(Math.random()));
    const θ=Math.random()*Math.PI*2;
    const φ=Math.acos(2*Math.random()-1);
    pts.push({x:r*Math.sin(φ)*Math.cos(θ),y:r*Math.sin(φ)*Math.sin(θ),z:r*Math.cos(φ)*0.3});
  }
  return pts;
}

const SHAPES = [cloudIdle,fibSphere,torusKnot,roseFlower,dnaHelix,galaxySpiral];

/* ─────────────────────────────────────────────
   MORPH ENGINE
───────────────────────────────────────────── */
let currentShape = 0;
let morphing = false;

function morphTo(shapeIdx){
  if(morphing) return;
  morphing = true;
  currentShape = shapeIdx;

  const targets = SHAPES[shapeIdx](COUNT);
  const pos = geo.attributes.position;
  const gsapTargets = [];

  for(let i=0;i<COUNT;i++){
    gsapTargets.push({i, x:pos.array[i*3], y:pos.array[i*3+1], z:pos.array[i*3+2]});
  }

  // Update label
  document.getElementById('shape-name').textContent = SHAPE_NAMES[shapeIdx];

  // Update UI pills
  document.querySelectorAll('.pill').forEach(p=>{
    p.classList.toggle('active', parseInt(p.dataset.shape)===shapeIdx);
  });

  gsap.to(gsapTargets,{
    duration: shapeIdx===0 ? 2.2 : 1.8,
    ease: shapeIdx===0 ? 'power3.out' : 'expo.inOut',
    stagger:{amount:0.5, from:'random'},
    x: (i)=>targets[gsapTargets[i].i].x,
    y: (i)=>targets[gsapTargets[i].i].y,
    z: (i)=>targets[gsapTargets[i].i].z,
    onUpdate(){
      for(let i=0;i<COUNT;i++){
        pos.array[i*3]  =gsapTargets[i].x;
        pos.array[i*3+1]=gsapTargets[i].y;
        pos.array[i*3+2]=gsapTargets[i].z;
      }
      pos.needsUpdate=true;
    },
    onComplete(){ morphing=false; }
  });
}

// Start on sphere
setTimeout(()=>morphTo(1), 800);

/* ─────────────────────────────────────────────
   MOUSE REPEL
───────────────────────────────────────────── */
const mouse2D = {x:0,y:0};
const mouse3D = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const repelPlane = new THREE.Plane(new THREE.Vector3(0,0,1),0);

window.addEventListener('mousemove',e=>{
  mouse2D.x=(e.clientX/window.innerWidth)*2-1;
  mouse2D.y=-(e.clientY/window.innerHeight)*2+1;
  // Fade hint
  document.getElementById('hint').style.opacity='0';
});

/* ─────────────────────────────────────────────
   INTERACTION
───────────────────────────────────────────── */
let shapeIdx = 1;
let cooldown = false;

function nextShape(){
  if(cooldown||morphing) return;
  shapeIdx=(shapeIdx+1)%SHAPES.length;
  morphTo(shapeIdx);
  cooldown=true; setTimeout(()=>cooldown=false,1200);
}

window.addEventListener('click', nextShape);
window.addEventListener('wheel', e=>{ e.preventDefault(); nextShape(); },{passive:false});

document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',e=>{
    e.stopPropagation();
    const idx=parseInt(p.dataset.shape);
    if(idx===currentShape) return;
    shapeIdx=idx;
    if(!morphing){
      morphTo(idx);
      cooldown=true; setTimeout(()=>cooldown=false,1200);
    }
  });
});

/* ─────────────────────────────────────────────
   CAMERA MOUSE PARALLAX
───────────────────────────────────────────── */
const camTarget={x:0,y:0};

/* ─────────────────────────────────────────────
   IDLE DRIFT (applied when in cloud mode)
───────────────────────────────────────────── */
const velocity = new Float32Array(COUNT*3);
for(let i=0;i<COUNT*3;i++) velocity[i]=(Math.random()-.5)*0.08;

/* ─────────────────────────────────────────────
   RENDER LOOP
───────────────────────────────────────────── */
const clock = new THREE.Clock();
let autoRotY=0, autoRotX=0;

function applyMouseRepel(){
  // Project mouse to 3D plane at z=0
  raycaster.setFromCamera({x:mouse2D.x,y:mouse2D.y},camera);
  raycaster.ray.intersectPlane(repelPlane, mouse3D);

  const pos=geo.attributes.position.array;
  const REPEL_RADIUS=85, REPEL_STRENGTH=0.7;

  for(let i=0;i<COUNT;i++){
    const px=pos[i*3], py=pos[i*3+1], pz=pos[i*3+2];
    const dx=px-mouse3D.x, dy=py-mouse3D.y;
    const dist2=dx*dx+dy*dy;
    const thresh=REPEL_RADIUS*REPEL_RADIUS;
    if(dist2<thresh && dist2>0.01){
      const dist=Math.sqrt(dist2);
      const force=REPEL_STRENGTH*(1-dist/REPEL_RADIUS);
      velocity[i*3]   += (dx/dist)*force;
      velocity[i*3+1] += (dy/dist)*force;
    }
  }
}

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  mat.uniforms.uTime.value=t;

  // Auto-rotate group
  autoRotY += 0.0018;
  autoRotX = Math.sin(t*0.12)*0.08;
  points.rotation.y = autoRotY;
  points.rotation.x = autoRotX;

  // Camera parallax
  camTarget.x += (mouse2D.x*28 - camera.position.x)*0.04;
  camTarget.y += (mouse2D.y*16 - camera.position.y)*0.04;
  camera.position.x += (camTarget.x - camera.position.x)*0.06;
  camera.position.y += (camTarget.y - camera.position.y)*0.06;
  camera.lookAt(scene.position);

  // Apply repel & velocity (cloud idle mode only)
  if(currentShape===0 && !morphing){
    applyMouseRepel();
    const pos=geo.attributes.position.array;
    for(let i=0;i<COUNT;i++){
      pos[i*3]  +=velocity[i*3];
      pos[i*3+1]+=velocity[i*3+1];
      pos[i*3+2]+=velocity[i*3+2];
      velocity[i*3]  *=0.96;
      velocity[i*3+1]*=0.96;
      velocity[i*3+2]*=0.96;
      // Stochastic drift
      velocity[i*3]   +=(Math.random()-.5)*0.04;
      velocity[i*3+1] +=(Math.random()-.5)*0.04;
      // Soft boundary
      const r2=pos[i*3]*pos[i*3]+pos[i*3+1]*pos[i*3+1]+pos[i*3+2]*pos[i*3+2];
      if(r2>SPREAD*SPREAD){
        velocity[i*3]  -=pos[i*3]*0.0004;
        velocity[i*3+1]-=pos[i*3+1]*0.0004;
        velocity[i*3+2]-=pos[i*3+2]*0.0004;
      }
    }
    geo.attributes.position.needsUpdate=true;
  } else if(!morphing){
    // Gentle repel on morphed shapes
    applyMouseRepel();
    const pos=geo.attributes.position.array;
    for(let i=0;i<COUNT;i++){
      pos[i*3]  +=velocity[i*3]*0.3;
      pos[i*3+1]+=velocity[i*3+1]*0.3;
      velocity[i*3]  *=0.88;
      velocity[i*3+1]*=0.88;
    }
    geo.attributes.position.needsUpdate=true;
  }

  // Pulsing size
  const sArr=geo.attributes.size.array;
  for(let i=0;i<COUNT;i++){
    sArr[i]=1.5+Math.random()*0.15 + 2.5*Math.abs(Math.sin(t*0.8+i*0.01));
  }
  geo.attributes.size.needsUpdate=true;

  renderer.render(scene,camera);
}
animate();

/* ─────────────────────────────────────────────
   RESIZE
───────────────────────────────────────────── */
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
});
</script>
</body>
</html>
