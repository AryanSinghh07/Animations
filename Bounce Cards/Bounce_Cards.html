<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bounce Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
      background: radial-gradient(140% 130% at 8% 2%, #22184e 0%, #0e1020 44%, #06070f 100%);
      color: #f3f1ff;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: -25%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 25%, rgba(187, 130, 255, 0.28) 0%, rgba(187, 130, 255, 0) 46%),
        radial-gradient(circle at 84% 73%, rgba(94, 166, 255, 0.23) 0%, rgba(94, 166, 255, 0) 50%);
      animation: floatMistA 16s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at 72% 20%, rgba(255, 144, 235, 0.18) 0%, rgba(255, 144, 235, 0) 42%),
        radial-gradient(circle at 21% 86%, rgba(127, 112, 255, 0.18) 0%, rgba(127, 112, 255, 0) 42%);
      animation: floatMistB 20s ease-in-out infinite alternate;
    }

    @keyframes floatMistA {
      from { transform: translate3d(-2%, -2%, 0) scale(0.98); }
      to { transform: translate3d(2%, 2%, 0) scale(1.04); }
    }

    @keyframes floatMistB {
      from { transform: translate3d(2%, -1%, 0) scale(1); }
      to { transform: translate3d(-2%, 1%, 0) scale(1.06); }
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .stage {
      position: relative;
      width: min(920px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 28px 28px;
      border-radius: 34px;
      border: 1px solid rgba(224, 214, 255, 0.2);
      background: linear-gradient(145deg, rgba(21, 17, 46, 0.77), rgba(10, 12, 22, 0.72));
      backdrop-filter: blur(11px);
      box-shadow:
        0 32px 70px rgba(2, 2, 10, 0.58),
        0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      overflow: visible;
    }

    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 0%, rgba(255, 255, 255, 0.2), transparent 42%),
        linear-gradient(115deg, rgba(187, 130, 255, 0.08), rgba(94, 166, 255, 0.04));
      z-index: 0;
    }

    .label,
    .title,
    .subtitle,
    #bounce-container,
    .replay-btn {
      position: relative;
      z-index: 1;
    }

    .label {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(225, 214, 255, 0.24);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: rgba(232, 222, 255, 0.8);
    }

    .title {
      font-size: clamp(1.9rem, 4.2vw, 3rem);
      line-height: 1;
      letter-spacing: 0.01em;
      font-weight: 800;
      text-shadow: 0 10px 24px rgba(14, 12, 45, 0.5);
    }

    .subtitle {
      max-width: 560px;
      text-align: center;
      color: rgba(220, 214, 245, 0.72);
      font-size: 0.92rem;
      letter-spacing: 0.01em;
    }

    #bounce-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 700px);
      margin: 12px 0 6px;
      isolation: isolate;
    }

    .card {
      position: absolute;
      width: 200px;
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      border: 1px solid rgba(239, 231, 255, 0.28);
      padding: 10px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.19), rgba(255, 255, 255, 0.03));
      box-shadow: 0 16px 36px rgba(3, 2, 14, 0.48);
      transform: scale(0);
      cursor: pointer;
      will-change: transform, box-shadow;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
      z-index: 2;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: -55% 35% 55% -35%;
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0));
      transform: rotate(-16deg);
      opacity: 0.35;
      pointer-events: none;
      z-index: 3;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      display: block;
      pointer-events: none;
      user-select: none;
      transform: scale(1.03);
      transition: transform 0.45s ease, filter 0.45s ease;
    }

    .card:hover img {
      transform: scale(1.08);
      filter: saturate(1.15) contrast(1.06);
    }

    .replay-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 11px 24px;
      background: linear-gradient(130deg, rgba(167, 104, 255, 0.28), rgba(94, 166, 255, 0.2));
      border: 1px solid rgba(224, 213, 255, 0.32);
      box-shadow: 0 14px 26px rgba(4, 4, 22, 0.38);
      color: rgba(245, 240, 255, 0.9);
      font-family: 'Sora', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.18s, background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .replay-btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(130deg, rgba(182, 124, 255, 0.4), rgba(111, 181, 255, 0.3));
      border-color: rgba(234, 226, 255, 0.5);
      color: #fff;
      box-shadow: 0 18px 28px rgba(7, 6, 30, 0.42);
    }

    .replay-btn:active {
      transform: translateY(0);
    }

    .replay-btn svg {
      flex-shrink: 0;
    }

    body { cursor: none; }

    #cursor-ring {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(198, 181, 255, 0.45);
      transform: translate(-50%, -50%);
      transition: width 0.18s, height 0.18s, border-color 0.18s, opacity 0.3s;
      opacity: 0;
      mix-blend-mode: screen;
    }

    #cursor-dot {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      width: 5px;
      height: 5px;
      background: #cfbfff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    @media (max-width: 760px) {
      .stage {
        padding: 24px 16px 22px;
        border-radius: 24px;
      }

      .title {
        font-size: clamp(1.55rem, 8vw, 2.3rem);
      }

      .subtitle {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>


<!-- Cursor -->
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<!-- Page -->
<div class="page">
  <section class="stage">
    <span class="label">Interactive Gallery</span>
    <h1 class="title">Bounce Cards</h1>
    <p class="subtitle">Hover over a card to spread the stack and replay the intro whenever you want.</p>

    <div id="bounce-container"></div>

    <button class="replay-btn" id="replayBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Replay Animation
    </button>
  </section>
</div>

<script>


// ═══════════════════════════════════════════════
//  BOUNCE CARDS — vanilla JS port of React component
// ═══════════════════════════════════════════════

// ── Config ─────────────────────────────────────
const IMAGES = [
  'https://picsum.photos/seed/archi/400/400',
  'https://picsum.photos/seed/nature9/400/400',
  'https://picsum.photos/seed/city44/400/400',
  'https://picsum.photos/seed/ocean7/400/400',
  'https://picsum.photos/seed/forest3/400/400',
];

const CONTAINER_W   = 700;
const CONTAINER_H   = 320;
const ANIM_DELAY    = 0.2;
const ANIM_STAGGER  = 0.07;
const EASE_TYPE     = 'elastic.out(1, 0.76)';
const ENABLE_HOVER  = true;
const PUSH_DISTANCE = 190;
const HOVER_LIFT    = 14;

const TRANSFORM_STYLES = [
  'rotate(-14deg) translate(-228px)',
  'rotate(-7deg) translate(-114px)',
  'rotate(-1deg)',
  'rotate(9deg) translate(114px)',
  'rotate(16deg) translate(228px)',
];

const GLOW_COLORS = [
  'rgba(191, 136, 255, 0.4)',
  'rgba(120, 166, 255, 0.35)',
  'rgba(255, 138, 232, 0.32)',
  'rgba(123, 109, 255, 0.35)',
  'rgba(162, 128, 255, 0.38)',
];

// ── Build DOM ──────────────────────────────────
const container = document.getElementById('bounce-container');
container.style.width  = CONTAINER_W + 'px';
container.style.height = CONTAINER_H + 'px';

function fitContainer() {
  const availableWidth = Math.max(320, window.innerWidth - 42);
  const scale = Math.min(1, availableWidth / CONTAINER_W);
  container.style.transform = `scale(${scale})`;
}

window.addEventListener('resize', fitContainer);
fitContainer();

const cardEls = IMAGES.map((src, idx) => {
  const card = document.createElement('div');
  card.className = `card card-${idx}`;
  card.style.transform = TRANSFORM_STYLES[idx] || 'none';
  card.style.zIndex = String(100 + idx);
  card.style.boxShadow =
    `0 22px 56px rgba(4, 3, 20, 0.58), 0 0 0 1px rgba(255,255,255,0.1) inset, 0 0 56px ${GLOW_COLORS[idx] || GLOW_COLORS[0]}`;

  const img = document.createElement('img');
  img.src = src;
  img.alt = `card-${idx}`;
  img.loading = 'lazy';
  img.width  = 200;
  img.height = 200;

  card.appendChild(img);
  container.appendChild(card);
  return card;
});

// ── Helpers (direct port from React source) ────
function getNoRotationTransform(transformStr) {
  if (/rotate\([\s\S]*?\)/.test(transformStr)) {
    return transformStr.replace(/rotate\([\s\S]*?\)/, 'rotate(0deg)');
  } else if (transformStr === 'none') {
    return 'rotate(0deg)';
  } else {
    return `${transformStr} rotate(0deg)`;
  }
}

function getPushedTransform(baseTransform, offsetX) {
  const translateRegex = /translate\(([-0-9.]+)px\)/;
  const match = baseTransform.match(translateRegex);
  if (match) {
    const newX = parseFloat(match[1]) + offsetX;
    return baseTransform.replace(translateRegex, `translate(${newX}px)`);
  } else {
    return baseTransform === 'none'
      ? `translate(${offsetX}px)`
      : `${baseTransform} translate(${offsetX}px)`;
  }
}

// ── Animate in (runs on load & replay) ─────────
function runEntrance() {
  gsap.fromTo(
    '.card',
    { scale: 0, y: 90, opacity: 0 },
    {
      scale: 1,
      y: 0,
      opacity: 1,
      duration: 1.05,
      stagger: ANIM_STAGGER,
      ease:    EASE_TYPE,
      delay:   ANIM_DELAY,
    }
  );
}
runEntrance();

// ── Hover: push siblings ────────────────────────
function pushSiblings(hoveredIdx) {
  if (!ENABLE_HOVER) return;
  IMAGES.forEach((_, i) => {
    const el = cardEls[i];
    gsap.killTweensOf(el);

    const base = TRANSFORM_STYLES[i] || 'none';

    if (i === hoveredIdx) {
      el.style.zIndex = '300';
      gsap.to(el, {
        transform: getNoRotationTransform(base),
        scale: 1.08,
        y: -HOVER_LIFT,
        opacity: 1,
        duration: 0.45,
        ease: 'power3.out',
        boxShadow:
          `0 28px 68px rgba(4, 3, 21, 0.62), 0 0 0 1px rgba(255,255,255,0.18) inset, 0 0 68px ${GLOW_COLORS[i] || GLOW_COLORS[0]}`,
        overwrite: 'auto',
      });
    } else {
      const offsetX  = i < hoveredIdx ? -PUSH_DISTANCE : PUSH_DISTANCE;
      const pushed   = getPushedTransform(base, offsetX);
      const distance = Math.abs(hoveredIdx - i);
      el.style.zIndex = String(100 - distance);
      gsap.to(el, {
        transform: pushed,
        scale: 0.93,
        y: 5 + distance * 1.8,
        opacity: 0.9,
        duration: 0.45,
        ease: 'power3.out',
        delay: distance * 0.04,
        boxShadow:
          `0 14px 34px rgba(4, 3, 20, 0.48), 0 0 0 1px rgba(255,255,255,0.08) inset, 0 0 24px ${GLOW_COLORS[i] || GLOW_COLORS[0]}`,
        overwrite: 'auto',
      });
    }
  });
}

// ── Hover: reset siblings ───────────────────────
function resetSiblings() {
  if (!ENABLE_HOVER) return;
  IMAGES.forEach((_, i) => {
    const el = cardEls[i];
    gsap.killTweensOf(el);
    el.style.zIndex = String(100 + i);
    gsap.to(el, {
      transform: TRANSFORM_STYLES[i] || 'none',
      scale: 1,
      y: 0,
      opacity: 1,
      duration: 0.45,
      ease: 'power3.out',
      boxShadow:
        `0 22px 56px rgba(4, 3, 20, 0.58), 0 0 0 1px rgba(255,255,255,0.1) inset, 0 0 56px ${GLOW_COLORS[i] || GLOW_COLORS[0]}`,
      overwrite: 'auto',
    });
  });
}

// ── Bind hover events ───────────────────────────
cardEls.forEach((card, idx) => {
  card.addEventListener('mouseenter', () => pushSiblings(idx));
  card.addEventListener('mouseleave', resetSiblings);
});

// ── Replay button ───────────────────────────────
document.getElementById('replayBtn').addEventListener('click', () => {
  gsap.set('.card', { scale: 0, y: 90, opacity: 0 });
  runEntrance();
});


// ═══════════════════════════════════════════════
//  CUSTOM CURSOR
// ═══════════════════════════════════════════════
const ring = document.getElementById('cursor-ring');
const dot  = document.getElementById('cursor-dot');
let rx = 0, ry = 0, mx = 0, my = 0, cursorOn = false;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  if (!cursorOn) {
    ring.style.opacity = '1'; dot.style.opacity = '1';
    cursorOn = true;
  }
});
document.addEventListener('mouseleave', () => {
  ring.style.opacity = '0'; dot.style.opacity = '0';
  cursorOn = false;
});
(function lagRing() {
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(lagRing);
})();

document.querySelectorAll('.card, button').forEach(el => {
  el.style.cursor = 'none';
  el.addEventListener('mouseenter', () => {
    ring.style.width = '52px'; ring.style.height = '52px';
    ring.style.borderColor = 'rgba(205, 170, 255, 0.82)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(198, 181, 255, 0.45)';
  });
});
</script>
</body>
</html>
