<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <!-- gl-matrix (mat4, quat, vec2, vec3) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/3.4.2/gl-matrix-min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #080810;
      font-family: 'Inter', sans-serif;
    }

    /* ── App shell ── */
    #app {
      position: relative;
      width: 100vw; height: 100vh;
    }

    /* ── Canvas fills container (alpha:false → black bg from gl) ── */
    #infinite-grid-menu-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
      cursor: grab;
    }
    #infinite-grid-menu-canvas:active { cursor: grabbing; }

    /* ══════════════════════════════════════════
       InfiniteMenu.css
    ══════════════════════════════════════════ */

    /* Shared transition for active/inactive */
    .face-title,
    .face-description,
    .action-button {
      position: absolute;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    /* ── Title ── */
    .face-title {
      top: clamp(24px, 5vh, 48px);
      left: 50%; transform: translateX(-50%) translateY(0);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 4rem);
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.92);
      text-align: center;
      white-space: nowrap;
    }
    .face-title.active  { opacity: 1; transform: translateX(-50%) translateY(0); }
    .face-title.inactive{ opacity: 0; transform: translateX(-50%) translateY(-12px); }

    /* ── Description ── */
    .face-description {
      bottom: clamp(60px, 10vh, 100px);
      left: 50%; transform: translateX(-50%) translateY(0);
      max-width: min(420px, 90vw);
      text-align: center;
      font-size: 0.82rem;
      line-height: 1.6;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.38);
    }
    .face-description.active  { opacity: 1; transform: translateX(-50%) translateY(0); }
    .face-description.inactive{ opacity: 0; transform: translateX(-50%) translateY(10px); }

    /* ── Action button (↗) ── */
    .action-button {
      bottom: clamp(24px, 4vh, 40px);
      right: clamp(24px, 4vw, 40px);
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(168,85,247,0.5);
      border-radius: 50%;
      pointer-events: auto; cursor: pointer;
      background: rgba(168,85,247,0.1);
      backdrop-filter: blur(8px);
      transition: opacity 0.35s ease, transform 0.35s ease,
                  background 0.2s ease, box-shadow 0.2s ease;
    }
    .action-button:hover {
      background: rgba(168,85,247,0.25);
      box-shadow: 0 0 24px rgba(168,85,247,0.4);
    }
    .action-button-icon {
      font-size: 1.1rem; color: rgba(255,255,255,0.8); line-height: 1;
    }
    .action-button.active  { opacity: 1; transform: scale(1); }
    .action-button.inactive{ opacity: 0; transform: scale(0.85); }

    /* ── Hint text ── */
    .drag-hint {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); pointer-events: none;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>

<div id="app">
  <canvas id="infinite-grid-menu-canvas"></canvas>

  <!-- Active item UI — shown/hidden via JS -->
  <h2 id="face-title"       class="face-title inactive"></h2>
  <p  id="face-description" class="face-description inactive"></p>
  <div id="action-button"   class="action-button inactive">
    <p class="action-button-icon">&#x2197;</p>
  </div>

  <p class="drag-hint" id="dragHint">drag to explore</p>
</div>

<script>
// ═══════════════════════════════════════════════════
//  gl-matrix destructure from CDN global
// ═══════════════════════════════════════════════════
const { mat4, quat, vec2, vec3 } = glMatrix;

// ═══════════════════════════════════════════════════
//  ITEMS  (replace with your own images/links)
// ═══════════════════════════════════════════════════
const ITEMS = [
  { image:'https://picsum.photos/seed/im01/900/900', link:'#', title:'INNOVATION',   description:'Pushing boundaries with AI-driven creativity and next-gen interfaces.' },
  { image:'https://picsum.photos/seed/im02/900/900', link:'#', title:'DESIGN',        description:'Crafting pixel-perfect experiences with purpose and intention.' },
  { image:'https://picsum.photos/seed/im03/900/900', link:'#', title:'ENGINEERING',   description:'Robust systems built to scale — from prototype to production.' },
  { image:'https://picsum.photos/seed/im04/900/900', link:'#', title:'RESEARCH',      description:'Deep exploration at the intersection of science and technology.' },
  { image:'https://picsum.photos/seed/im05/900/900', link:'#', title:'COMMUNITY',     description:'A global network of builders, thinkers, and dreamers.' },
  { image:'https://picsum.photos/seed/im06/900/900', link:'#', title:'EDUCATION',     description:'Knowledge is the most powerful tool for change.' },
  { image:'https://picsum.photos/seed/im07/900/900', link:'#', title:'SUSTAINABILITY',description:'Building for the future with responsibility and care.' },
  { image:'https://picsum.photos/seed/im08/900/900', link:'#', title:'HEALTH',        description:'Technology that improves lives and empowers wellness.' },
];

// ═══════════════════════════════════════════════════
//  VERTEX / FACE / GEOMETRY
// ═══════════════════════════════════════════════════
class Face { constructor(a,b,c){this.a=a;this.b=b;this.c=c;} }

class Vertex {
  constructor(x,y,z){
    this.position = vec3.fromValues(x,y,z);
    this.normal   = vec3.create();
    this.uv       = vec2.create();
  }
}

class Geometry {
  constructor(){ this.vertices=[]; this.faces=[]; }
  addVertex(...args){ for(let i=0;i<args.length;i+=3) this.vertices.push(new Vertex(args[i],args[i+1],args[i+2])); return this; }
  addFace(...args)  { for(let i=0;i<args.length;i+=3) this.faces.push(new Face(args[i],args[i+1],args[i+2])); return this; }
  get lastVertex(){ return this.vertices[this.vertices.length-1]; }

  subdivide(divisions=1){
    const cache={};
    let f=this.faces;
    for(let d=0;d<divisions;++d){
      const nf=new Array(f.length*4);
      f.forEach((face,ndx)=>{
        const mAB=this.getMidPoint(face.a,face.b,cache);
        const mBC=this.getMidPoint(face.b,face.c,cache);
        const mCA=this.getMidPoint(face.c,face.a,cache);
        const i=ndx*4;
        nf[i+0]=new Face(face.a,mAB,mCA);
        nf[i+1]=new Face(face.b,mBC,mAB);
        nf[i+2]=new Face(face.c,mCA,mBC);
        nf[i+3]=new Face(mAB,mBC,mCA);
      });
      f=nf;
    }
    this.faces=f; return this;
  }
  spherize(r=1){
    this.vertices.forEach(v=>{ vec3.normalize(v.normal,v.position); vec3.scale(v.position,v.normal,r); });
    return this;
  }
  getMidPoint(a,b,cache){
    const key=a<b?`k_${b}_${a}`:`k_${a}_${b}`;
    if(Object.prototype.hasOwnProperty.call(cache,key)) return cache[key];
    const pa=this.vertices[a].position, pb=this.vertices[b].position;
    const ndx=this.vertices.length; cache[key]=ndx;
    this.addVertex((pa[0]+pb[0])*.5,(pa[1]+pb[1])*.5,(pa[2]+pb[2])*.5);
    return ndx;
  }
  get data(){ return { vertices:this.vertexData, indices:this.indexData, normals:this.normalData, uvs:this.uvData }; }
  get vertexData(){ return new Float32Array(this.vertices.flatMap(v=>Array.from(v.position))); }
  get normalData(){ return new Float32Array(this.vertices.flatMap(v=>Array.from(v.normal))); }
  get uvData()    { return new Float32Array(this.vertices.flatMap(v=>Array.from(v.uv))); }
  get indexData() { return new Uint16Array(this.faces.flatMap(f=>[f.a,f.b,f.c])); }
}

class IcosahedronGeometry extends Geometry {
  constructor(){
    super();
    const t=Math.sqrt(5)*.5+.5;
    this.addVertex(-1,t,0,1,t,0,-1,-t,0,1,-t,0,0,-1,t,0,1,t,0,-1,-t,0,1,-t,t,0,-1,t,0,1,-t,0,-1,-t,0,1)
        .addFace(0,11,5,0,5,1,0,1,7,0,7,10,0,10,11,1,5,9,5,11,4,11,10,2,10,7,6,7,1,8,3,9,4,3,4,2,3,2,6,3,6,8,3,8,9,4,9,5,2,4,11,6,2,10,8,6,7,9,8,1);
  }
}

class DiscGeometry extends Geometry {
  constructor(steps=4,radius=1){
    super();
    steps=Math.max(4,steps);
    const alpha=(2*Math.PI)/steps;
    this.addVertex(0,0,0);
    this.lastVertex.uv[0]=.5; this.lastVertex.uv[1]=.5;
    for(let i=0;i<steps;++i){
      const x=Math.cos(alpha*i), y=Math.sin(alpha*i);
      this.addVertex(radius*x,radius*y,0);
      this.lastVertex.uv[0]=x*.5+.5; this.lastVertex.uv[1]=y*.5+.5;
      if(i>0) this.addFace(0,i,i+1);
    }
    this.addFace(0,steps,1);
  }
}

// ═══════════════════════════════════════════════════
//  WEBGL HELPERS
// ═══════════════════════════════════════════════════
function createShader(gl,type,source){
  const s=gl.createShader(type); gl.shaderSource(s,source); gl.compileShader(s);
  if(gl.getShaderParameter(s,gl.COMPILE_STATUS)) return s;
  console.error(gl.getShaderInfoLog(s)); gl.deleteShader(s); return null;
}
function createProgram(gl,sources,tfv,attribLocs){
  const p=gl.createProgram();
  [gl.VERTEX_SHADER,gl.FRAGMENT_SHADER].forEach((t,i)=>{ const s=createShader(gl,t,sources[i]); if(s) gl.attachShader(p,s); });
  if(tfv) gl.transformFeedbackVaryings(p,tfv,gl.SEPARATE_ATTRIBS);
  if(attribLocs) for(const a in attribLocs) gl.bindAttribLocation(p,attribLocs[a],a);
  gl.linkProgram(p);
  if(gl.getProgramParameter(p,gl.LINK_STATUS)) return p;
  console.error(gl.getProgramInfoLog(p)); gl.deleteProgram(p); return null;
}
function makeVertexArray(gl,bufLocNumElmPairs,indices){
  const va=gl.createVertexArray(); gl.bindVertexArray(va);
  for(const [buf,loc,num] of bufLocNumElmPairs){
    if(loc===-1) continue;
    gl.bindBuffer(gl.ARRAY_BUFFER,buf); gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,num,gl.FLOAT,false,0,0);
  }
  if(indices){
    const ib=gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(indices),gl.STATIC_DRAW);
  }
  gl.bindVertexArray(null); return va;
}
function makeBuffer(gl,sizeOrData,usage){
  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,sizeOrData,usage); gl.bindBuffer(gl.ARRAY_BUFFER,null); return buf;
}
function resizeCanvasToDisplaySize(canvas){
  const dpr=Math.min(2,window.devicePixelRatio);
  const w=Math.round(canvas.clientWidth*dpr), h=Math.round(canvas.clientHeight*dpr);
  const needs=canvas.width!==w||canvas.height!==h;
  if(needs){ canvas.width=w; canvas.height=h; }
  return needs;
}
function createAndSetupTexture(gl,minF,magF,wS,wT){
  const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,wS);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,wT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,minF);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,magF);
  return t;
}

// ═══════════════════════════════════════════════════
//  SHADERS  (exact copy from React source)
// ═══════════════════════════════════════════════════
const discVertShaderSource = `#version 300 es
uniform mat4 uWorldMatrix;
uniform mat4 uViewMatrix;
uniform mat4 uProjectionMatrix;
uniform vec3 uCameraPosition;
uniform vec4 uRotationAxisVelocity;
in vec3 aModelPosition;
in vec3 aModelNormal;
in vec2 aModelUvs;
in mat4 aInstanceMatrix;
out vec2 vUvs;
out float vAlpha;
flat out int vInstanceId;
#define PI 3.141593
void main() {
    vec4 worldPosition = uWorldMatrix * aInstanceMatrix * vec4(aModelPosition, 1.);
    vec3 centerPos = (uWorldMatrix * aInstanceMatrix * vec4(0., 0., 0., 1.)).xyz;
    float radius = length(centerPos.xyz);
    if (gl_VertexID > 0) {
        vec3 rotationAxis = uRotationAxisVelocity.xyz;
        float rotationVelocity = min(.15, uRotationAxisVelocity.w * 15.);
        vec3 stretchDir = normalize(cross(centerPos, rotationAxis));
        vec3 relativeVertexPos = normalize(worldPosition.xyz - centerPos);
        float strength = dot(stretchDir, relativeVertexPos);
        float invAbsStrength = min(0., abs(strength) - 1.);
        strength = rotationVelocity * sign(strength) * abs(invAbsStrength * invAbsStrength * invAbsStrength + 1.);
        worldPosition.xyz += stretchDir * strength;
    }
    worldPosition.xyz = radius * normalize(worldPosition.xyz);
    gl_Position = uProjectionMatrix * uViewMatrix * worldPosition;
    vAlpha = smoothstep(0.5, 1., normalize(worldPosition.xyz).z) * .9 + .1;
    vUvs = aModelUvs;
    vInstanceId = gl_InstanceID;
}`;

const discFragShaderSource = `#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform int uItemCount;
uniform int uAtlasSize;
out vec4 outColor;
in vec2 vUvs;
in float vAlpha;
flat in int vInstanceId;
void main() {
    int itemIndex = vInstanceId % uItemCount;
    int cellsPerRow = uAtlasSize;
    int cellX = itemIndex % cellsPerRow;
    int cellY = itemIndex / cellsPerRow;
    vec2 cellSize = vec2(1.0) / vec2(float(cellsPerRow));
    vec2 cellOffset = vec2(float(cellX), float(cellY)) * cellSize;
    ivec2 texSize = textureSize(uTex, 0);
    float imageAspect = float(texSize.x) / float(texSize.y);
    float scale = max(imageAspect / 1.0, 1.0 / imageAspect);
    vec2 st = vec2(vUvs.x, 1.0 - vUvs.y);
    st = (st - 0.5) * scale + 0.5;
    st = clamp(st, 0.0, 1.0);
    st = st * cellSize + cellOffset;
    outColor = texture(uTex, st);
    outColor.a *= vAlpha;
}`;

// ═══════════════════════════════════════════════════
//  ArcballControl  (exact port)
// ═══════════════════════════════════════════════════
class ArcballControl {
  constructor(canvas, updateCallback){
    this.canvas = canvas;
    this.updateCallback = updateCallback || (()=>null);
    this.isPointerDown = false;
    this.orientation  = quat.create();
    this.pointerRotation = quat.create();
    this.rotationVelocity = 0;
    this.rotationAxis = vec3.fromValues(1,0,0);
    this.snapDirection = vec3.fromValues(0,0,-1);
    this.snapTargetDirection = null;
    this.EPSILON = 0.1;
    this.IDENTITY_QUAT = quat.create();
    this.pointerPos = vec2.create();
    this.previousPointerPos = vec2.create();
    this._rotationVelocity = 0;
    this._combinedQuat = quat.create();

    canvas.addEventListener('pointerdown', e=>{
      vec2.set(this.pointerPos, e.clientX, e.clientY);
      vec2.copy(this.previousPointerPos, this.pointerPos);
      this.isPointerDown=true;
    });
    canvas.addEventListener('pointerup',    ()=>{ this.isPointerDown=false; });
    canvas.addEventListener('pointerleave', ()=>{ this.isPointerDown=false; });
    canvas.addEventListener('pointermove',  e=>{ if(this.isPointerDown) vec2.set(this.pointerPos,e.clientX,e.clientY); });
    canvas.style.touchAction='none';
  }

  update(deltaTime, targetFrameDuration=16){
    const ts = deltaTime/targetFrameDuration + 0.00001;
    let angleFactor = ts;
    let snapRotation = quat.create();

    if(this.isPointerDown){
      const INTENSITY = 0.3*ts;
      const ANGLE_AMP = 5/ts;
      const mid = vec2.sub(vec2.create(), this.pointerPos, this.previousPointerPos);
      vec2.scale(mid, mid, INTENSITY);
      if(vec2.sqrLen(mid) > this.EPSILON){
        vec2.add(mid, this.previousPointerPos, mid);
        const p = this._project(mid);
        const q = this._project(this.previousPointerPos);
        const a = vec3.normalize(vec3.create(),p);
        const b = vec3.normalize(vec3.create(),q);
        vec2.copy(this.previousPointerPos, mid);
        angleFactor *= ANGLE_AMP;
        this.quatFromVectors(a,b,this.pointerRotation,angleFactor);
      } else {
        quat.slerp(this.pointerRotation, this.pointerRotation, this.IDENTITY_QUAT, INTENSITY);
      }
    } else {
      const INTENSITY = 0.1*ts;
      quat.slerp(this.pointerRotation, this.pointerRotation, this.IDENTITY_QUAT, INTENSITY);
      if(this.snapTargetDirection){
        const SNAP = 0.2;
        const a = this.snapTargetDirection, b = this.snapDirection;
        const sqrDist = vec3.squaredDistance(a,b);
        const distFactor = Math.max(0.1, 1-sqrDist*10);
        angleFactor *= SNAP * distFactor;
        this.quatFromVectors(a,b,snapRotation,angleFactor);
      }
    }

    const combined = quat.multiply(quat.create(), snapRotation, this.pointerRotation);
    this.orientation = quat.multiply(quat.create(), combined, this.orientation);
    quat.normalize(this.orientation, this.orientation);

    const RA = 0.8*ts;
    quat.slerp(this._combinedQuat, this._combinedQuat, combined, RA);
    quat.normalize(this._combinedQuat, this._combinedQuat);

    const rad = Math.acos(this._combinedQuat[3])*2.0;
    const s = Math.sin(rad/2.0);
    let rv=0;
    if(s>0.000001){
      rv = rad/(2*Math.PI);
      this.rotationAxis[0]=this._combinedQuat[0]/s;
      this.rotationAxis[1]=this._combinedQuat[1]/s;
      this.rotationAxis[2]=this._combinedQuat[2]/s;
    }
    const RV = 0.5*ts;
    this._rotationVelocity += (rv-this._rotationVelocity)*RV;
    this.rotationVelocity = this._rotationVelocity/ts;
    this.updateCallback(deltaTime);
  }

  quatFromVectors(a,b,out,af=1){
    const axis = vec3.normalize(vec3.create(), vec3.cross(vec3.create(),a,b));
    const d = Math.max(-1,Math.min(1,vec3.dot(a,b)));
    const angle = Math.acos(d)*af;
    quat.setAxisAngle(out,axis,angle);
    return {q:out,axis,angle};
  }

  _project(pos){
    const r=2, w=this.canvas.clientWidth, h=this.canvas.clientHeight;
    const s=Math.max(w,h)-1;
    const x=(2*pos[0]-w-1)/s;
    const y=(2*pos[1]-h-1)/s;
    let z=0;
    const xySq=x*x+y*y, rSq=r*r;
    if(xySq<=rSq/2) z=Math.sqrt(rSq-xySq); else z=rSq/Math.sqrt(xySq);
    return vec3.fromValues(-x,y,z);
  }
}

// ═══════════════════════════════════════════════════
//  InfiniteGridMenu  (exact port)
// ═══════════════════════════════════════════════════
class InfiniteGridMenu {
  TARGET_FRAME_DURATION = 1000/60;
  SPHERE_RADIUS = 2;
  #time=0; #deltaTime=0; #deltaFrames=0; #frames=0;

  camera = {
    matrix: mat4.create(), near:.1, far:40, fov:Math.PI/4, aspect:1,
    position: vec3.fromValues(0,0,3), up: vec3.fromValues(0,1,0),
    matrices: { view:mat4.create(), projection:mat4.create(), inversProjection:mat4.create() }
  };

  nearestVertexIndex = null;
  smoothRotationVelocity = 0;
  scaleFactor = 1.0;
  movementActive = false;

  constructor(canvas, items, onActiveItemChange, onMovementChange, onInit=null, scale=1.0){
    this.canvas = canvas;
    this.items  = items || [];
    this.onActiveItemChange = onActiveItemChange || (()=>{});
    this.onMovementChange   = onMovementChange   || (()=>{});
    this.scaleFactor = scale;
    this.camera.position[2] = 3*scale;
    this.#init(onInit);
  }

  resize(){
    this.viewportSize = vec2.set(this.viewportSize||vec2.create(), this.canvas.clientWidth, this.canvas.clientHeight);
    const gl=this.gl;
    if(resizeCanvasToDisplaySize(gl.canvas)) gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
    this.#updateProjectionMatrix(gl);
  }

  run(time=0){
    this.#deltaTime  = Math.min(32, time-this.#time);
    this.#time       = time;
    this.#deltaFrames= this.#deltaTime/this.TARGET_FRAME_DURATION;
    this.#frames    += this.#deltaFrames;
    this.#animate(this.#deltaTime);
    this.#render();
    requestAnimationFrame(t=>this.run(t));
  }

  #init(onInit){
    this.gl = this.canvas.getContext('webgl2',{antialias:true,alpha:false});
    const gl=this.gl;
    if(!gl) throw new Error('No WebGL 2!');

    this.viewportSize = vec2.fromValues(this.canvas.clientWidth, this.canvas.clientHeight);

    this.discProgram = createProgram(gl,[discVertShaderSource,discFragShaderSource],null,{
      aModelPosition:0, aModelNormal:1, aModelUvs:2, aInstanceMatrix:3
    });
    this.discLocations = {
      aModelPosition: gl.getAttribLocation(this.discProgram,'aModelPosition'),
      aModelUvs:      gl.getAttribLocation(this.discProgram,'aModelUvs'),
      aInstanceMatrix:gl.getAttribLocation(this.discProgram,'aInstanceMatrix'),
      uWorldMatrix:   gl.getUniformLocation(this.discProgram,'uWorldMatrix'),
      uViewMatrix:    gl.getUniformLocation(this.discProgram,'uViewMatrix'),
      uProjectionMatrix:gl.getUniformLocation(this.discProgram,'uProjectionMatrix'),
      uCameraPosition:gl.getUniformLocation(this.discProgram,'uCameraPosition'),
      uScaleFactor:   gl.getUniformLocation(this.discProgram,'uScaleFactor'),
      uRotationAxisVelocity:gl.getUniformLocation(this.discProgram,'uRotationAxisVelocity'),
      uTex:           gl.getUniformLocation(this.discProgram,'uTex'),
      uFrames:        gl.getUniformLocation(this.discProgram,'uFrames'),
      uItemCount:     gl.getUniformLocation(this.discProgram,'uItemCount'),
      uAtlasSize:     gl.getUniformLocation(this.discProgram,'uAtlasSize'),
    };

    const discGeo = new DiscGeometry(56,1);
    const discBuf = discGeo.data;
    this.discBuffers = discBuf;
    this.discVAO = makeVertexArray(gl,[
      [makeBuffer(gl,discBuf.vertices,gl.STATIC_DRAW), this.discLocations.aModelPosition, 3],
      [makeBuffer(gl,discBuf.uvs,      gl.STATIC_DRAW), this.discLocations.aModelUvs,      2],
    ], discBuf.indices);

    const icoGeo = new IcosahedronGeometry();
    icoGeo.subdivide(1).spherize(this.SPHERE_RADIUS);
    this.instancePositions   = icoGeo.vertices.map(v=>v.position);
    this.DISC_INSTANCE_COUNT = icoGeo.vertices.length;
    this.#initDiscInstances(this.DISC_INSTANCE_COUNT);

    this.worldMatrix = mat4.create();
    this.#initTexture();

    this.control = new ArcballControl(this.canvas, dt=>this.#onControlUpdate(dt));
    this.#updateCameraMatrix();
    this.#updateProjectionMatrix(gl);
    this.resize();
    if(onInit) onInit(this);
  }

  #initTexture(){
    const gl=this.gl;
    this.tex = createAndSetupTexture(gl,gl.LINEAR,gl.LINEAR,gl.CLAMP_TO_EDGE,gl.CLAMP_TO_EDGE);
    const itemCount = Math.max(1,this.items.length);
    this.atlasSize  = Math.ceil(Math.sqrt(itemCount));
    const atlasCvs  = document.createElement('canvas');
    const ctx       = atlasCvs.getContext('2d');
    const cellSize  = 512;
    atlasCvs.width  = this.atlasSize * cellSize;
    atlasCvs.height = this.atlasSize * cellSize;
    Promise.all(this.items.map(item=>new Promise(res=>{
      const img=new Image(); img.crossOrigin='anonymous';
      img.onload=()=>res(img); img.src=item.image;
    }))).then(images=>{
      images.forEach((img,i)=>{
        const x=(i%this.atlasSize)*cellSize;
        const y=Math.floor(i/this.atlasSize)*cellSize;
        ctx.drawImage(img,x,y,cellSize,cellSize);
      });
      gl.bindTexture(gl.TEXTURE_2D,this.tex);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,atlasCvs);
      gl.generateMipmap(gl.TEXTURE_2D);
    });
  }

  #initDiscInstances(count){
    const gl=this.gl;
    this.discInstances={
      matricesArray: new Float32Array(count*16),
      matrices: [],
      buffer: gl.createBuffer()
    };
    for(let i=0;i<count;++i){
      const arr=new Float32Array(this.discInstances.matricesArray.buffer,i*16*4,16);
      arr.set(mat4.create()); this.discInstances.matrices.push(arr);
    }
    gl.bindVertexArray(this.discVAO);
    gl.bindBuffer(gl.ARRAY_BUFFER,this.discInstances.buffer);
    gl.bufferData(gl.ARRAY_BUFFER,this.discInstances.matricesArray.byteLength,gl.DYNAMIC_DRAW);
    const bpm=16*4;
    for(let j=0;j<4;++j){
      const loc=this.discLocations.aInstanceMatrix+j;
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc,4,gl.FLOAT,false,bpm,j*4*4);
      gl.vertexAttribDivisor(loc,1);
    }
    gl.bindBuffer(gl.ARRAY_BUFFER,null);
    gl.bindVertexArray(null);
  }

  #animate(deltaTime){
    const gl=this.gl;
    this.control.update(deltaTime,this.TARGET_FRAME_DURATION);
    const scale=0.25, SCALE_INTENSITY=0.6;
    const positions=this.instancePositions.map(p=>vec3.transformQuat(vec3.create(),p,this.control.orientation));
    positions.forEach((p,ndx)=>{
      const s=(Math.abs(p[2])/this.SPHERE_RADIUS)*SCALE_INTENSITY+(1-SCALE_INTENSITY);
      const fs=s*scale;
      const m=mat4.create();
      mat4.multiply(m,m,mat4.fromTranslation(mat4.create(),vec3.negate(vec3.create(),p)));
      mat4.multiply(m,m,mat4.targetTo(mat4.create(),[0,0,0],p,[0,1,0]));
      mat4.multiply(m,m,mat4.fromScaling(mat4.create(),[fs,fs,fs]));
      mat4.multiply(m,m,mat4.fromTranslation(mat4.create(),[0,0,-this.SPHERE_RADIUS]));
      mat4.copy(this.discInstances.matrices[ndx],m);
    });
    gl.bindBuffer(gl.ARRAY_BUFFER,this.discInstances.buffer);
    gl.bufferSubData(gl.ARRAY_BUFFER,0,this.discInstances.matricesArray);
    gl.bindBuffer(gl.ARRAY_BUFFER,null);
    this.smoothRotationVelocity=this.control.rotationVelocity;
  }

  #render(){
    const gl=this.gl;
    gl.useProgram(this.discProgram);
    gl.enable(gl.CULL_FACE);
    gl.enable(gl.DEPTH_TEST);
    gl.clearColor(0.031,0.031,0.063,1);   // ← matches #080810
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.uniformMatrix4fv(this.discLocations.uWorldMatrix,     false,this.worldMatrix);
    gl.uniformMatrix4fv(this.discLocations.uViewMatrix,      false,this.camera.matrices.view);
    gl.uniformMatrix4fv(this.discLocations.uProjectionMatrix,false,this.camera.matrices.projection);
    gl.uniform3f(this.discLocations.uCameraPosition,...this.camera.position);
    gl.uniform4f(this.discLocations.uRotationAxisVelocity,
      this.control.rotationAxis[0],this.control.rotationAxis[1],this.control.rotationAxis[2],
      this.smoothRotationVelocity*1.1);
    gl.uniform1i(this.discLocations.uItemCount, this.items.length);
    gl.uniform1i(this.discLocations.uAtlasSize, this.atlasSize);
    gl.uniform1f(this.discLocations.uFrames,    this.#frames);
    gl.uniform1f(this.discLocations.uScaleFactor,this.scaleFactor);
    gl.uniform1i(this.discLocations.uTex, 0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D,this.tex);
    gl.bindVertexArray(this.discVAO);
    gl.drawElementsInstanced(gl.TRIANGLES,this.discBuffers.indices.length,gl.UNSIGNED_SHORT,0,this.DISC_INSTANCE_COUNT);
  }

  #updateCameraMatrix(){
    mat4.targetTo(this.camera.matrix,this.camera.position,[0,0,0],this.camera.up);
    mat4.invert(this.camera.matrices.view,this.camera.matrix);
  }

  #updateProjectionMatrix(gl){
    this.camera.aspect=gl.canvas.clientWidth/gl.canvas.clientHeight;
    const h=this.SPHERE_RADIUS*.35, dist=this.camera.position[2];
    this.camera.fov = this.camera.aspect>1
      ? 2*Math.atan(h/dist)
      : 2*Math.atan(h/this.camera.aspect/dist);
    mat4.perspective(this.camera.matrices.projection,this.camera.fov,this.camera.aspect,this.camera.near,this.camera.far);
    mat4.invert(this.camera.matrices.inversProjection,this.camera.matrices.projection);
  }

  #onControlUpdate(deltaTime){
    const ts=deltaTime/this.TARGET_FRAME_DURATION+.0001;
    let damping=5/ts, cameraTargetZ=3*this.scaleFactor;
    const isMoving=this.control.isPointerDown||Math.abs(this.smoothRotationVelocity)>.01;
    if(isMoving!==this.movementActive){ this.movementActive=isMoving; this.onMovementChange(isMoving); }
    if(!this.control.isPointerDown){
      const ni=this.#findNearestVertexIndex();
      this.onActiveItemChange(ni%Math.max(1,this.items.length));
      this.control.snapTargetDirection=vec3.normalize(vec3.create(),this.#getVertexWorldPosition(ni));
    } else {
      cameraTargetZ+=this.control.rotationVelocity*80+2.5; damping=7/ts;
    }
    this.camera.position[2]+=(cameraTargetZ-this.camera.position[2])/damping;
    this.#updateCameraMatrix();
  }

  #findNearestVertexIndex(){
    const n=this.control.snapDirection;
    const inv=quat.conjugate(quat.create(),this.control.orientation);
    const nt=vec3.transformQuat(vec3.create(),n,inv);
    let maxD=-1, idx=0;
    for(let i=0;i<this.instancePositions.length;++i){
      const d=vec3.dot(nt,this.instancePositions[i]);
      if(d>maxD){maxD=d;idx=i;}
    }
    return idx;
  }

  #getVertexWorldPosition(index){
    return vec3.transformQuat(vec3.create(),this.instancePositions[index],this.control.orientation);
  }
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
const canvas     = document.getElementById('infinite-grid-menu-canvas');
const titleEl    = document.getElementById('face-title');
const descEl     = document.getElementById('face-description');
const btnEl      = document.getElementById('action-button');
const hintEl     = document.getElementById('dragHint');

let activeItem = null;

function handleActiveItemChange(index){
  const item = ITEMS[index % ITEMS.length];
  if(activeItem === item) return;
  activeItem = item;
  titleEl.textContent = item.title;
  descEl.textContent  = item.description;
  btnEl.onclick = ()=>{
    if(!item.link) return;
    if(item.link.startsWith('http')) window.open(item.link,'_blank');
  };
}

function handleMovementChange(isMoving){
  const cls = isMoving ? ['inactive','active'] : ['active','inactive'];
  titleEl.classList.replace(cls[1],cls[0]);
  descEl.classList.replace(cls[1],cls[0]);
  btnEl.classList.replace(cls[1],cls[0]);
  hintEl.style.opacity = isMoving ? '0' : '0.3';
}

const sketch = new InfiniteGridMenu(
  canvas, ITEMS,
  handleActiveItemChange,
  handleMovementChange,
  sk => sk.run(),
  1.0
);

window.addEventListener('resize', ()=> sketch.resize());
</script>
