<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ASCII Text</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
	<style>
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: #000;
			font-family: 'IBM Plex Mono', monospace;
		}

		.ascii-text-container {
			position: fixed;
			inset: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			touch-action: none;
			display: grid;
			place-items: center;
			background: #000;
		}

		.ascii-text-container canvas {
			position: absolute;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			image-rendering: optimizeSpeed;
			image-rendering: -moz-crisp-edges;
			image-rendering: -o-crisp-edges;
			image-rendering: -webkit-optimize-contrast;
			image-rendering: optimize-contrast;
			image-rendering: crisp-edges;
			image-rendering: pixelated;
		}

		.ascii-text-container pre {
			margin: 0;
			user-select: none;
			padding: 0;
			line-height: 1em;
			text-align: left;
			position: absolute;
			left: 0;
			top: 0;
			background-image: radial-gradient(circle, #ff6188 0%, #fc9867 50%, #ffd866 100%);
			background-attachment: fixed;
			-webkit-text-fill-color: transparent;
			-webkit-background-clip: text;
			z-index: 3;
			mix-blend-mode: difference;
			pointer-events: none;
			text-shadow:
				0 0 12px rgba(255, 97, 136, 0.35),
				0 0 30px rgba(255, 216, 102, 0.28);
		}

		.ascii-text-container > div {
			z-index: 2;
		}

		.text-input-panel {
			position: fixed;
			right: 18px;
			bottom: 18px;
			z-index: 30;
			padding: 10px;
			border: 1px solid rgba(255, 255, 255, 0.24);
			background: rgba(0, 0, 0, 0.8);
			border-radius: 10px;
			backdrop-filter: blur(6px);
			-webkit-backdrop-filter: blur(6px);
		}

		.text-input-panel input {
			width: min(260px, 58vw);
			height: 36px;
			padding: 0 11px;
			outline: none;
			border: 1px solid rgba(255, 255, 255, 0.28);
			border-radius: 8px;
			background: #000;
			color: #f5f5f5;
			font-size: 14px;
			font-family: 'IBM Plex Mono', monospace;
		}

		.text-input-panel input::placeholder {
			color: rgba(255, 255, 255, 0.52);
		}
	</style>
</head>
<body>
	<div id="ascii-text-root" class="ascii-text-container"></div>
	<div class="text-input-panel">
		<input id="text-input" type="text" placeholder="Type a word" />
	</div>

	<script type="module">
		import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

		const CONFIG = {
			text: '',
			asciiFontSize: 7,
			textFontSize: 160,
			textColor: '#fdf9f3',
			planeBaseHeight: 6.5,
			enableWaves: true,
		};

		const vertexShader = `
varying vec2 vUv;
uniform float uTime;
uniform float mouse;
uniform float uEnableWaves;

void main() {
		vUv = uv;
		float time = uTime * 5.;

		float waveFactor = uEnableWaves;

		vec3 transformed = position;

		transformed.x += sin(time + position.y) * 0.5 * waveFactor;
		transformed.y += cos(time + position.z) * 0.15 * waveFactor;
		transformed.z += sin(time + position.x) * waveFactor;

		gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
}
`;

		const fragmentShader = `
varying vec2 vUv;
uniform float mouse;
uniform float uTime;
uniform sampler2D uTexture;

void main() {
		float time = uTime;
		vec2 pos = vUv;
		float shift = sin(time + mouse + pos.y * 6.2831) * 0.006;
		vec2 uvR = clamp(pos + vec2(shift, 0.0), 0.0, 1.0);
		vec2 uvG = clamp(pos + vec2(-shift * 0.4, shift * 0.3), 0.0, 1.0);
		vec2 uvB = clamp(pos + vec2(0.0, -shift), 0.0, 1.0);

		float r = texture2D(uTexture, uvR).r;
		float g = texture2D(uTexture, uvG).g;
		float b = texture2D(uTexture, uvB).b;
		float a = texture2D(uTexture, pos).a;
		gl_FragColor = vec4(r, g, b, a);
}
`;

		const PX_RATIO = window.devicePixelRatio || 1;

		function mapRange(n, start, stop, start2, stop2) {
			return ((n - start) / (stop - start)) * (stop2 - start2) + start2;
		}

		class AsciiFilter {
			constructor(renderer, { fontSize, fontFamily, charset, invert } = {}) {
				this.renderer = renderer;
				this.domElement = document.createElement('div');
				this.domElement.style.position = 'absolute';
				this.domElement.style.top = '0';
				this.domElement.style.left = '0';
				this.domElement.style.width = '100%';
				this.domElement.style.height = '100%';
				this.domElement.style.pointerEvents = 'none';

				this.pre = document.createElement('pre');
				this.domElement.appendChild(this.pre);

				this.canvas = document.createElement('canvas');
				this.context = this.canvas.getContext('2d', { willReadFrequently: true });
				this.canvas.style.display = 'none';
				this.domElement.appendChild(this.canvas);

				this.deg = 0;
				this.invert = invert ?? true;
				this.fontSize = fontSize ?? 12;
				this.fontFamily = fontFamily ?? "'Courier New', monospace";
				this.charset = charset ?? ' .:-=+*#%@';

				this.context.webkitImageSmoothingEnabled = false;
				this.context.mozImageSmoothingEnabled = false;
				this.context.msImageSmoothingEnabled = false;
				this.context.imageSmoothingEnabled = false;

				this.onMouseMove = this.onMouseMove.bind(this);
				document.addEventListener('mousemove', this.onMouseMove);
			}

			setSize(width, height) {
				this.width = width;
				this.height = height;
				this.renderer.setSize(width, height);
				this.reset();

				this.center = { x: width / 2, y: height / 2 };
				this.mouse = { x: this.center.x, y: this.center.y };
			}

			reset() {
				this.context.font = `${this.fontSize}px ${this.fontFamily}`;
				const charWidth = this.context.measureText('A').width;

				this.cols = Math.floor(this.width / (this.fontSize * (charWidth / this.fontSize)));
				this.rows = Math.floor(this.height / this.fontSize);

				this.canvas.width = this.cols;
				this.canvas.height = this.rows;
				this.pre.style.fontFamily = this.fontFamily;
				this.pre.style.fontSize = `${this.fontSize}px`;
				this.pre.style.margin = '0';
				this.pre.style.padding = '0';
				this.pre.style.lineHeight = '1em';
				this.pre.style.position = 'absolute';
				this.pre.style.left = '0';
				this.pre.style.top = '0';
				this.pre.style.zIndex = '9';
				this.pre.style.backgroundAttachment = 'fixed';
				this.pre.style.mixBlendMode = 'difference';
			}

			render(scene, camera) {
				this.renderer.render(scene, camera);

				const w = this.canvas.width;
				const h = this.canvas.height;
				this.context.clearRect(0, 0, w, h);
				if (this.context && w && h) {
					this.context.drawImage(this.renderer.domElement, 0, 0, w, h);
				}

				this.asciify(this.context, w, h);
				this.hue();
			}

			onMouseMove(e) {
				this.mouse = { x: e.clientX * PX_RATIO, y: e.clientY * PX_RATIO };
			}

			get dx() {
				return this.mouse.x - this.center.x;
			}

			get dy() {
				return this.mouse.y - this.center.y;
			}

			hue() {
				const deg = (Math.atan2(this.dy, this.dx) * 180) / Math.PI;
				this.deg += (deg - this.deg) * 0.075;
				this.domElement.style.filter = `hue-rotate(${this.deg.toFixed(1)}deg)`;
			}

			asciify(ctx, w, h) {
				if (!(w && h)) return;

				const imgData = ctx.getImageData(0, 0, w, h).data;
				let str = '';
				for (let y = 0; y < h; y++) {
					for (let x = 0; x < w; x++) {
						const i = x * 4 + y * 4 * w;
						const r = imgData[i];
						const g = imgData[i + 1];
						const b = imgData[i + 2];
						const a = imgData[i + 3];

						if (a === 0) {
							str += ' ';
							continue;
						}

						const gray = (0.3 * r + 0.6 * g + 0.1 * b) / 255;
						let idx = Math.floor((1 - gray) * (this.charset.length - 1));
						if (this.invert) idx = this.charset.length - idx - 1;
						str += this.charset[idx];
					}
					str += '\n';
				}

				this.pre.textContent = str;
			}

			dispose() {
				document.removeEventListener('mousemove', this.onMouseMove);
			}
		}

		class CanvasTxt {
			constructor(txt, { fontSize = 200, fontFamily = 'Arial', color = '#fdf9f3' } = {}) {
				this.canvas = document.createElement('canvas');
				this.context = this.canvas.getContext('2d');
				this.txt = txt;
				this.fontSize = fontSize;
				this.fontFamily = fontFamily;
				this.color = color;
				this.paddingX = Math.max(20, Math.round(this.fontSize * 0.1));
				this.paddingY = Math.max(20, Math.round(this.fontSize * 0.12));

				this.font = `600 ${this.fontSize}px ${this.fontFamily}`;
			}

			resize() {
				this.context.font = this.font;
				this.metrics = this.context.measureText(this.txt || ' ');

				const textWidth = Math.ceil(this.metrics.width) + this.paddingX * 2;
				const textHeight = Math.ceil(this.metrics.actualBoundingBoxAscent + this.metrics.actualBoundingBoxDescent) + this.paddingY * 2;

				this.canvas.width = Math.max(2, textWidth);
				this.canvas.height = Math.max(2, textHeight);
			}

			render() {
				this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
				if (!this.txt) return;

				this.context.fillStyle = this.color;
				this.context.font = this.font;
				this.context.textAlign = 'center';
				this.context.textBaseline = 'alphabetic';

				const ascent = this.metrics ? this.metrics.actualBoundingBoxAscent : this.fontSize * 0.75;
				const descent = this.metrics ? this.metrics.actualBoundingBoxDescent : this.fontSize * 0.25;
				const textBlockHeight = ascent + descent;
				const baselineY = (this.canvas.height - textBlockHeight) / 2 + ascent;

				this.context.fillText(this.txt, this.canvas.width / 2, baselineY);
			}

			get width() {
				return this.canvas.width;
			}

			get height() {
				return this.canvas.height;
			}

			get texture() {
				return this.canvas;
			}
		}

		class CanvAscii {
			constructor(
				{ text, asciiFontSize, textFontSize, textColor, planeBaseHeight, enableWaves },
				containerElem,
				width,
				height
			) {
				this.textString = text;
				this.asciiFontSize = asciiFontSize;
				this.textFontSize = textFontSize;
				this.textColor = textColor;
				this.planeBaseHeight = planeBaseHeight;
				this.container = containerElem;
				this.width = width;
				this.height = height;
				this.enableWaves = enableWaves;

				this.camera = new THREE.PerspectiveCamera(45, this.width / this.height, 1, 1000);
				this.camera.position.z = 30;

				this.scene = new THREE.Scene();
				this.mouse = { x: this.width / 2, y: this.height / 2 };

				this.onMouseMove = this.onMouseMove.bind(this);
			}

			async init() {
				try {
					await document.fonts.load('600 200px "IBM Plex Mono"');
					await document.fonts.load('500 12px "IBM Plex Mono"');
				} catch (_) {
					// No-op fallback if font loading API is unavailable.
				}
				await document.fonts.ready;
				this.setMesh();
				this.setRenderer();
			}

			setMesh() {
				this.textCanvas = new CanvasTxt(this.textString, {
					fontSize: this.textFontSize,
					fontFamily: 'IBM Plex Mono',
					color: this.textColor,
				});
				this.textCanvas.resize();
				this.textCanvas.render();

				this.texture = new THREE.CanvasTexture(this.textCanvas.texture);
				this.texture.minFilter = THREE.NearestFilter;
				this.texture.magFilter = THREE.NearestFilter;
				this.texture.wrapS = THREE.ClampToEdgeWrapping;
				this.texture.wrapT = THREE.ClampToEdgeWrapping;
				this.texture.needsUpdate = true;

				const textAspect = this.textCanvas.width / this.textCanvas.height;
				const baseH = this.planeBaseHeight;
				const planeW = baseH * textAspect;
				const planeH = baseH;

				this.geometry = new THREE.PlaneGeometry(planeW, planeH, 36, 36);
				this.material = new THREE.ShaderMaterial({
					vertexShader,
					fragmentShader,
					transparent: true,
					uniforms: {
						uTime: { value: 0 },
						mouse: { value: 1.0 },
						uTexture: { value: this.texture },
						uEnableWaves: { value: this.enableWaves ? 1.0 : 0.0 },
					},
				});

				this.mesh = new THREE.Mesh(this.geometry, this.material);
				this.mesh.position.set(0, 0, 0);
				this.mesh.visible = this.textString.length > 0;
				this.scene.add(this.mesh);
			}

			setText(nextText) {
				const value = (nextText ?? '').toString();
				this.textString = value;

				if (!this.textCanvas || !this.mesh) return;

				this.textCanvas.txt = this.textString;
				this.textCanvas.resize();
				this.textCanvas.render();

				if (this.texture) {
					this.texture.dispose();
				}
				this.texture = new THREE.CanvasTexture(this.textCanvas.texture);
				this.texture.minFilter = THREE.NearestFilter;
				this.texture.magFilter = THREE.NearestFilter;
				this.texture.wrapS = THREE.ClampToEdgeWrapping;
				this.texture.wrapT = THREE.ClampToEdgeWrapping;
				this.texture.needsUpdate = true;

				this.mesh.material.uniforms.uTexture.value = this.texture;
				this.mesh.material.needsUpdate = true;
				this.mesh.visible = this.textString.length > 0;
				this.mesh.position.set(0, 0, 0);
				this.mesh.rotation.set(0, 0, 0);

				const textAspect = this.textCanvas.width / this.textCanvas.height;
				const planeW = this.planeBaseHeight * textAspect;
				const planeH = this.planeBaseHeight;

				const nextGeometry = new THREE.PlaneGeometry(planeW, planeH, 36, 36);
				this.mesh.geometry.dispose();
				this.mesh.geometry = nextGeometry;
			}

			setRenderer() {
				this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
				this.renderer.setPixelRatio(1);
				this.renderer.setClearColor(0x000000, 0);

				this.filter = new AsciiFilter(this.renderer, {
					fontFamily: 'IBM Plex Mono',
					fontSize: this.asciiFontSize,
					invert: true,
				});

				this.container.appendChild(this.filter.domElement);
				this.setSize(this.width, this.height);

				this.container.addEventListener('mousemove', this.onMouseMove);
				this.container.addEventListener('touchmove', this.onMouseMove, { passive: true });
			}

			setSize(w, h) {
				this.width = w;
				this.height = h;

				this.camera.aspect = w / h;
				this.camera.updateProjectionMatrix();

				this.filter.setSize(w, h);

				this.center = { x: w / 2, y: h / 2 };
			}

			load() {
				this.animate();
			}

			onMouseMove(evt) {
				const e = evt.touches ? evt.touches[0] : evt;
				const bounds = this.container.getBoundingClientRect();
				const x = e.clientX - bounds.left;
				const y = e.clientY - bounds.top;
				this.mouse = { x, y };
			}

			animate() {
				const animateFrame = () => {
					this.animationFrameId = requestAnimationFrame(animateFrame);
					this.render();
				};
				animateFrame();
			}

			render() {
				const time = Date.now() * 0.001;

				this.textCanvas.render();
				this.texture.needsUpdate = true;

				this.mesh.material.uniforms.uTime.value = Math.sin(time);
				this.mesh.material.uniforms.mouse.value = mapRange(this.mouse.x, 0, this.width, -1, 1);

				this.updateRotation();
				this.mesh.position.y = Math.sin(time * 1.1) * 0.12;
				this.filter.render(this.scene, this.camera);
			}

			updateRotation() {
				const x = mapRange(this.mouse.y, 0, this.height, 0.35, -0.35);
				const y = mapRange(this.mouse.x, 0, this.width, -0.35, 0.35);

				this.mesh.rotation.x += (x - this.mesh.rotation.x) * 0.05;
				this.mesh.rotation.y += (y - this.mesh.rotation.y) * 0.05;
			}

			clear() {
				this.scene.traverse(obj => {
					if (obj.isMesh && typeof obj.material === 'object' && obj.material !== null) {
						Object.keys(obj.material).forEach(key => {
							const matProp = obj.material[key];
							if (matProp !== null && typeof matProp === 'object' && typeof matProp.dispose === 'function') {
								matProp.dispose();
							}
						});
						obj.material.dispose();
						obj.geometry.dispose();
					}
				});
				this.scene.clear();
			}

			dispose() {
				cancelAnimationFrame(this.animationFrameId);
				if (this.filter) {
					this.filter.dispose();
					if (this.filter.domElement.parentNode) {
						this.container.removeChild(this.filter.domElement);
					}
				}
				this.container.removeEventListener('mousemove', this.onMouseMove);
				this.container.removeEventListener('touchmove', this.onMouseMove);
				this.clear();
				if (this.texture) {
					this.texture.dispose();
					this.texture = null;
				}
				if (this.renderer) {
					this.renderer.dispose();
					this.renderer.forceContextLoss();
				}
			}
		}

		const container = document.getElementById('ascii-text-root');
		const textInput = document.getElementById('text-input');
		let asciiInstance = null;
		let resizeObserver = null;
		const handleTextInput = event => {
			const value = event.target.value;
			CONFIG.text = value;
			if (asciiInstance) asciiInstance.setText(value);
		};

		textInput.value = CONFIG.text;
		textInput.addEventListener('input', handleTextInput);

		async function mountASCIIText() {
			const rect = container.getBoundingClientRect();
			const width = Math.max(1, Math.floor(rect.width));
			const height = Math.max(1, Math.floor(rect.height));

			asciiInstance = new CanvAscii(CONFIG, container, width, height);
			await asciiInstance.init();
			asciiInstance.load();

			resizeObserver = new ResizeObserver(entries => {
				if (!entries[0] || !asciiInstance) return;
				const w = Math.max(1, Math.floor(entries[0].contentRect.width));
				const h = Math.max(1, Math.floor(entries[0].contentRect.height));
				asciiInstance.setSize(w, h);
			});
			resizeObserver.observe(container);
		}

		function unmountASCIIText() {
			if (resizeObserver) {
				resizeObserver.disconnect();
				resizeObserver = null;
			}
			textInput.removeEventListener('input', handleTextInput);
			if (asciiInstance) {
				asciiInstance.dispose();
				asciiInstance = null;
			}
		}

		mountASCIIText();
		window.addEventListener('beforeunload', unmountASCIIText);
	</script>
</body>
</html>
