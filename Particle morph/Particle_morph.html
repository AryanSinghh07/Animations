<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>PARTICLE.MORPH — Interactive 3D Particle Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   1. RESET & DESIGN TOKENS
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #06070b;
  --bg-deep:        #020205;
  --panel:          rgba(16, 18, 28, 0.62);
  --panel-border:   rgba(255, 255, 255, 0.14);
  --panel-hairline: rgba(255, 255, 255, 0.08);
  --text-primary:   #f6f8ff;
  --text-secondary: rgba(246, 248, 255, 0.66);
  --text-tertiary:  rgba(246, 248, 255, 0.40);
  --accent:         #00e5ff;
  --accent-2:       #5b8def;
  --accent-3:       #b14bff;
  --accent-rgb:     0, 229, 255;
  --accent2-rgb:    91, 141, 239;
  --accent3-rgb:    177, 75, 255;

  --font-display: 'Fraunces', Georgia, serif;
  --font-mono:    'JetBrains Mono', ui-monospace, Menlo, monospace;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 16% 18%, rgba(var(--accent-rgb), 0.17), transparent 43%),
    radial-gradient(circle at 84% 16%, rgba(var(--accent2-rgb), 0.14), transparent 37%),
    radial-gradient(circle at 58% 88%, rgba(var(--accent3-rgb), 0.16), transparent 46%),
    linear-gradient(160deg, #0a0f1a 0%, #05070f 52%, var(--bg-deep) 100%);
  color: var(--text-primary);
  font-family: var(--font-mono);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  cursor: none;
  transition: background 0.85s ease;
}

/* ============================================================
   2. ATMOSPHERIC LAYERS
   ============================================================ */
body::before {
  content: '';
  position: fixed; inset: -34%;
  pointer-events: none; z-index: 0;
  background:
    conic-gradient(from 170deg at 50% 50%,
      rgba(var(--accent-rgb), 0.16),
      rgba(var(--accent2-rgb), 0.08),
      rgba(var(--accent3-rgb), 0.14),
      rgba(var(--accent-rgb), 0.16));
  filter: blur(100px) saturate(1.15);
  animation: skySpin 28s linear infinite;
}

.vignette {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 4;
  background:
    radial-gradient(ellipse at center,
      rgba(0, 0, 0, 0) 36%,
      rgba(0, 0, 0, 0.72) 100%);
}

body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 5;
  opacity: 0.045;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.aurora {
  position: fixed;
  pointer-events: none;
  z-index: 2;
  border-radius: 50%;
  mix-blend-mode: screen;
  filter: blur(22px) saturate(1.15);
}

.aurora--a {
  width: 68vw; height: 68vw;
  min-width: 580px; min-height: 580px;
  left: -14vw; top: -30vh;
  background: radial-gradient(circle,
    rgba(var(--accent-rgb), 0.34) 0%,
    rgba(var(--accent2-rgb), 0.20) 38%,
    rgba(var(--accent3-rgb), 0.00) 68%);
  animation: auroraDriftA 16s ease-in-out infinite alternate;
}

.aurora--b {
  width: 56vw; height: 56vw;
  min-width: 440px; min-height: 440px;
  right: -10vw; bottom: -28vh;
  background: radial-gradient(circle,
    rgba(var(--accent3-rgb), 0.26) 0%,
    rgba(var(--accent2-rgb), 0.19) 42%,
    rgba(var(--accent-rgb), 0.00) 70%);
  animation: auroraDriftB 20s ease-in-out infinite alternate;
}

.scan-grid {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 3;
  opacity: 0.15;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
  background-size: 74px 74px;
  mask-image: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.75), transparent 78%);
  animation: gridDrift 20s linear infinite;
}

@keyframes skySpin {
  from { transform: rotate(0deg) scale(1); }
  to   { transform: rotate(360deg) scale(1.04); }
}

@keyframes auroraDriftA {
  0% { transform: translate3d(-3%, -2%, 0) scale(1.0); }
  100% { transform: translate3d(7%, 9%, 0) scale(1.14); }
}

@keyframes auroraDriftB {
  0% { transform: translate3d(0, 0, 0) scale(1.0); }
  100% { transform: translate3d(-8%, -11%, 0) scale(1.2); }
}

@keyframes gridDrift {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(0, 74px, 0); }
}

@keyframes panelEdgePulse {
  0%, 100% { opacity: 0.42; }
  50% { opacity: 0.86; }
}

/* ============================================================
   3. CANVAS
   ============================================================ */
#canvas {
  position: fixed; inset: 0;
  display: block;
  z-index: 1;
}

.ui-shell {
  position: fixed;
  top: 26px; left: 26px; right: 26px;
  z-index: 12;
  display: grid;
  grid-template-columns: minmax(230px, 340px) minmax(302px, 370px);
  justify-content: space-between;
  align-items: start;
  pointer-events: none;
}

/* ============================================================
   4. CUSTOM CURSOR
   ============================================================ */
.cursor {
  position: fixed; top: 0; left: 0;
  width: 30px; height: 30px;
  margin: -15px 0 0 -15px;
  border: 1px solid rgba(var(--accent-rgb), 0.78);
  border-radius: 50%;
  pointer-events: none;
  z-index: 100;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.30) inset,
    0 0 20px rgba(var(--accent-rgb), 0.42);
  mix-blend-mode: normal;
  transition:
    width 0.25s cubic-bezier(.2,.9,.2,1),
    height 0.25s cubic-bezier(.2,.9,.2,1),
    margin 0.25s cubic-bezier(.2,.9,.2,1),
    border-color 0.25s ease,
    box-shadow 0.25s ease;
}
.cursor::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 2px; height: 2px;
  margin: -1px 0 0 -1px;
  background: rgba(var(--accent-rgb), 1);
  border-radius: 50%;
}
.cursor.active {
  width: 70px; height: 70px;
  margin: -35px 0 0 -35px;
  border-color: var(--accent-3);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.24) inset,
    0 0 32px rgba(var(--accent3-rgb), 0.65);
}

/* ============================================================
   5. HUD (top-left readout)
   ============================================================ */
.hud {
  position: relative;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: min(340px, 36vw);
  opacity: 0;
  transform: translate3d(0, 16px, 0);
  transition: opacity 0.8s ease, transform 0.8s cubic-bezier(.2,.9,.2,1);
}

body.ready .hud {
  opacity: 1;
  transform: translate3d(0, 0, 0);
}

.hud__mark {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 560;
  font-size: clamp(28px, 2.8vw, 40px);
  letter-spacing: -0.022em;
  line-height: 1;
  color: var(--text-primary);
  text-shadow:
    0 0 30px rgba(var(--accent-rgb), 0.30),
    0 6px 26px rgba(0, 0, 0, 0.42);
}
.hud__mark span { color: var(--accent); font-style: normal; }

.hud__sub {
  align-self: start;
  padding: 8px 12px;
  border-radius: 999px;
  background: linear-gradient(125deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-size: 9px;
  letter-spacing: 0.21em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.hud__data {
  display: grid;
  gap: 6px;
  padding: 15px 16px;
  border-radius: 14px;
  background:
    linear-gradient(145deg, rgba(18, 24, 37, 0.78), rgba(8, 10, 18, 0.56));
  border: 1px solid rgba(255, 255, 255, 0.14);
  box-shadow:
    0 20px 38px rgba(0, 0, 0, 0.44),
    0 0 26px rgba(var(--accent2-rgb), 0.18),
    inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-secondary);
}

.hud__data > div {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.hud__data > div:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.hud__data i {
  font-style: normal;
  color: var(--text-tertiary);
  display: inline-block;
  min-width: 76px;
}
.hud__data b {
  font-weight: 600;
  color: var(--text-primary);
}

/* ============================================================
   6. CONTROL PANEL (top-right, glass-morph)
   ============================================================ */
.panel {
  --panel-tilt-x: 0deg;
  --panel-tilt-y: 0deg;
  --panel-shine-x: 50%;
  --panel-shine-y: 35%;
  position: relative;
  pointer-events: auto;
  width: 100%;
  max-width: 370px;
  max-height: calc(100vh - 130px);
  overflow-y: auto;
  padding: 20px;
  background:
    linear-gradient(170deg, rgba(24, 30, 49, 0.76) 0%, rgba(10, 12, 22, 0.62) 52%, rgba(9, 10, 18, 0.80) 100%);
  border: 1px solid var(--panel-border);
  border-radius: 18px;
  backdrop-filter: blur(22px) saturate(1.32);
  -webkit-backdrop-filter: blur(22px) saturate(1.32);
  box-shadow:
    0 28px 70px rgba(0,0,0,0.56),
    0 10px 35px rgba(var(--accent3-rgb),0.16),
    inset 0 0 0 1px rgba(255,255,255,0.04);
  transform: perspective(1200px) rotateX(var(--panel-tilt-x)) rotateY(var(--panel-tilt-y));
  transform-origin: center center;
  transition:
    transform 0.14s linear,
    border-color 0.35s ease,
    box-shadow 0.35s ease,
    opacity 0.8s ease,
    filter 0.8s ease;
  opacity: 0;
  filter: blur(7px);
}

body.ready .panel {
  opacity: 1;
  filter: blur(0);
}

.panel::before {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  border-radius: inherit;
  background:
    radial-gradient(260px circle at var(--panel-shine-x) var(--panel-shine-y),
      rgba(255,255,255,0.28),
      rgba(255,255,255,0.0) 68%);
  mix-blend-mode: screen;
  opacity: 0.32;
}

.panel::after {
  content: '';
  position: absolute; inset: -1px;
  border-radius: inherit;
  pointer-events: none;
  border: 1px solid rgba(var(--accent-rgb), 0.26);
  opacity: 0.5;
  animation: panelEdgePulse 4s ease-in-out infinite;
}

.panel::-webkit-scrollbar { width: 7px; }
.panel::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.18);
  border-radius: 99px;
}

.panel__header {
  position: relative;
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 16px;
}

.panel__title {
  font-size: 10px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.panel__indicator {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow:
    0 0 0 5px rgba(var(--accent-rgb), 0.12),
    0 0 16px rgba(var(--accent-rgb), 0.9);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.35; transform: scale(0.85); }
}

.section {
  margin-bottom: 12px;
  padding: 13px 12px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
}
.section:last-child { margin-bottom: 0; }

.section__label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}
.section__value {
  color: var(--text-primary);
  letter-spacing: 0.12em;
  font-weight: 600;
}

/* Shape grid */
.shape-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.shape-btn {
  aspect-ratio: 1;
  background:
    linear-gradient(160deg, rgba(255,255,255,0.085), rgba(255,255,255,0.03));
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  cursor: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  padding: 9px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.17em;
  text-transform: uppercase;
  transition:
    background 0.25s ease,
    border-color 0.25s ease,
    color 0.25s ease,
    transform 0.25s cubic-bezier(.2,.9,.2,1),
    box-shadow 0.25s ease;
}
.shape-btn:hover {
  background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05));
  border-color: rgba(255,255,255,0.42);
  color: var(--text-primary);
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 18px rgba(0,0,0,0.34);
}
.shape-btn.active {
  background:
    linear-gradient(145deg, rgba(var(--accent-rgb), 0.23), rgba(var(--accent2-rgb), 0.08));
  border-color: var(--accent);
  color: var(--text-primary);
  box-shadow:
    0 0 0 1px rgba(var(--accent-rgb), 0.45) inset,
    0 0 24px rgba(var(--accent-rgb), 0.35);
}
.shape-btn svg {
  width: 23px; height: 23px;
  stroke: currentColor; fill: none;
  stroke-width: 1.25;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Palette */
.palette-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}
.palette-btn {
  aspect-ratio: 1;
  border: 1px solid rgba(255, 255, 255, 0.34);
  border-radius: 50%;
  cursor: none;
  position: relative;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s cubic-bezier(.2,.9,.2,1), box-shadow 0.2s ease, border-color 0.2s ease;
}
.palette-btn:hover {
  transform: scale(1.14);
  border-color: rgba(255, 255, 255, 0.86);
}
.palette-btn.active {
  box-shadow:
    0 0 0 2px rgba(3, 4, 8, 0.92),
    0 0 0 3px rgba(255, 255, 255, 0.92),
    0 0 16px rgba(var(--accent-rgb), 0.45);
}

/* Sliders */
.slider-wrap { position: relative; padding: 6px 0; }

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, rgba(var(--accent-rgb),0.75), rgba(var(--accent2-rgb),0.36) 45%, rgba(255, 255, 255, 0.12));
  border-radius: 999px;
  outline: none;
  cursor: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 12px; height: 12px;
  background: linear-gradient(145deg, #ffffff, var(--accent));
  border-radius: 50%;
  cursor: none;
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  border: none;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.38), 0 0 12px rgba(var(--accent-rgb),0.6);
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.6);
  background: linear-gradient(145deg, #ffffff, var(--accent-3));
  box-shadow: 0 0 0 1px rgba(255,255,255,0.42), 0 0 16px rgba(var(--accent3-rgb),0.72);
}
input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: linear-gradient(145deg, #ffffff, var(--accent));
  border-radius: 50%;
  border: none;
  cursor: none;
}

/* ============================================================
   7. HINT STRIP (bottom)
   ============================================================ */
.hint {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 12;
  display: flex;
  gap: 24px;
  padding: 10px 18px;
  border-radius: 999px;
  background: linear-gradient(120deg, rgba(14,20,34,0.74), rgba(9,12,22,0.56));
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow:
    0 12px 30px rgba(0,0,0,0.44),
    0 0 26px rgba(var(--accent2-rgb), 0.19);
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  pointer-events: none;
  opacity: 0;
  filter: blur(8px);
  transition: opacity 0.8s ease 0.1s, filter 0.8s ease 0.1s;
}

body.ready .hint {
  opacity: 1;
  filter: blur(0);
}

.hint span {
  color: var(--text-primary);
  font-weight: 600;
  text-shadow: 0 0 14px rgba(var(--accent-rgb), 0.36);
}

/* ============================================================
   8. RESPONSIVE (mobile)
   ============================================================ */
@media (max-width: 980px) {
  .ui-shell {
    grid-template-columns: minmax(220px, 300px) minmax(280px, 340px);
    top: 18px; left: 18px; right: 18px;
  }
}

@media (max-width: 760px) {
  html, body { cursor: default; }
  .cursor { display: none; }
  .shape-btn, .palette-btn, input[type=range] { cursor: pointer; }

  .aurora { opacity: 0.46; }
  .scan-grid { opacity: 0.08; }

  .ui-shell {
    top: 12px; left: 12px; right: 12px;
    display: block;
  }

  .hud {
    width: min(78vw, 280px);
  }

  .hud__mark { font-size: 24px; }
  .hud__sub { font-size: 8px; }
  .hud__data { font-size: 9px; padding: 12px 12px; }
  .hud__data i { min-width: 60px; }

  .panel {
    position: fixed;
    top: auto; right: 12px; left: 12px; bottom: 12px;
    width: auto;
    max-width: none;
    max-height: 56vh;
    padding: 16px;
    --panel-tilt-x: 0deg;
    --panel-tilt-y: 0deg;
  }

  .hint { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }

  body::before,
  .aurora,
  .scan-grid,
  .panel::after {
    animation: none !important;
  }
}

/* Loading state */
.loading {
  position: fixed; inset: 0;
  z-index: 1000;
  background:
    radial-gradient(circle at 50% 35%, rgba(var(--accent-rgb), 0.14), transparent 48%),
    linear-gradient(150deg, #090c14 0%, #020205 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-secondary);
  transition: opacity 0.6s ease 0.2s, visibility 0s 0.8s;
}
.loading.gone { opacity: 0; visibility: hidden; }
</style>
</head>

<body>

<!-- Atmosphere -->
<div class="vignette"></div>
<div class="aurora aurora--a" aria-hidden="true"></div>
<div class="aurora aurora--b" aria-hidden="true"></div>
<div class="scan-grid" aria-hidden="true"></div>
<canvas id="canvas"></canvas>
<div class="cursor" id="cursor"></div>
<div class="loading" id="loading">Initialising particle field…</div>

<div class="ui-shell">
  <!-- HUD (top-left) -->
  <div class="hud">
    <div class="hud__mark">particle<span>.</span>morph</div>
    <div class="hud__sub">v1.0 · three.js particle engine</div>
    <div class="hud__data">
      <div><i>FPS</i> <b id="fps">--</b></div>
      <div><i>COUNT</i> <b id="count">5000</b></div>
      <div><i>SHAPE</i> <b id="shape-name">SPHERE</b></div>
      <div><i>PALETTE</i> <b id="palette-name">AURORA</b></div>
    </div>
  </div>

  <!-- Control panel (top-right) -->
  <aside class="panel">
    <div class="panel__header">
      <div class="panel__title">Control Deck</div>
      <div class="panel__indicator"></div>
    </div>

    <div class="section">
      <div class="section__label">
        <span>Morphology</span>
        <span class="section__value" id="shape-value">SPHERE</span>
      </div>
      <div class="shape-grid" id="shape-grid"></div>
    </div>

    <div class="section">
      <div class="section__label">
        <span>Palette</span>
        <span class="section__value" id="palette-value">AURORA</span>
      </div>
      <div class="palette-grid" id="palette-grid"></div>
    </div>

    <div class="section">
      <div class="section__label">

<script type="module">
import * as THREE from 'three';

/* ============================================================
   §1  CONFIGURATION
   ============================================================ */
const CONFIG = {
  count:         5000,        // particle count
  sizeRaw:       40,          // slider raw value; /1000 for world-space size
  repelRaw:      100,         // slider raw value; /100 for strength multiplier
  repelRadius:   0.8,         // world-space radius of repel influence
  morphLerp:     0.05,        // per-frame lerp toward target (smaller = slower, more elegant)
  idleStrength:  0.06,        // amplitude of idle drift
  shape:         'sphere',
  palette:       'aurora',
};

/* ============================================================
   §2  PALETTES
   Each is a 3-stop gradient; particles randomly sample the ramp.
   ============================================================ */
const PALETTES = {
  aurora: { name: 'AURORA', colors: ['#00e5ff', '#5b8def', '#b14bff'] },
  ember:  { name: 'EMBER',  colors: ['#ffc76b', '#ff6b3d', '#ff2154'] },
  pearl:  { name: 'PEARL',  colors: ['#ffffff', '#d9d9d9', '#f3d68f'] },
  bloom:  { name: 'BLOOM',  colors: ['#ff4d9e', '#ff86c2', '#ffc0dc'] },
  lichen: { name: 'LICHEN', colors: ['#b6ff6e', '#2ee8a1', '#52d4d0'] },
  iris:   { name: 'IRIS',   colors: ['#7b61ff', '#5b8def', '#c084fc'] },
};

function hexToRgbTriplet(hex) {
  let normalized = (hex || '').trim().replace('#', '');
  if (normalized.length === 3) {
    normalized = normalized.split('').map(ch => ch + ch).join('');
  }
  if (!/^[0-9a-fA-F]{6}$/.test(normalized)) return '255, 255, 255';
  const value = parseInt(normalized, 16);
  const r = (value >> 16) & 255;
  const g = (value >> 8) & 255;
  const b = value & 255;
  return `${r}, ${g}, ${b}`;
}

function applyPaletteTheme(name) {
  const palette = PALETTES[name] || PALETTES.aurora;
  const [c1, c2, c3] = palette.colors;
  const root = document.documentElement;
  root.style.setProperty('--accent', c1);
  root.style.setProperty('--accent-2', c2);
  root.style.setProperty('--accent-3', c3);
  root.style.setProperty('--accent-rgb', hexToRgbTriplet(c1));
  root.style.setProperty('--accent2-rgb', hexToRgbTriplet(c2));
  root.style.setProperty('--accent3-rgb', hexToRgbTriplet(c3));
}

/* ============================================================
   §3  SHAPE GENERATORS
   Each function writes an (x, y, z) target into the `out` array.
   Called once per particle per shape switch.
   ============================================================ */
const SHAPES = {
  /* Uniform distribution on sphere surface -------------------- */
  sphere(out) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 1.2;
    out[0] = r * Math.sin(phi) * Math.cos(theta);
    out[1] = r * Math.sin(phi) * Math.sin(theta);
    out[2] = r * Math.cos(phi);
  },

  /* Torus: (R + r·cosv)·cosu, r·sinv, (R + r·cosv)·sinu -------- */
  torus(out) {
    const R = 1.1, rad = 0.42;
    const u = Math.random() * Math.PI * 2;
    const v = Math.random() * Math.PI * 2;
    out[0] = (R + rad * Math.cos(v)) * Math.cos(u);
    out[1] =  rad * Math.sin(v);
    out[2] = (R + rad * Math.cos(v)) * Math.sin(u);
  },

  /* 3D heart — parametric curve puffed around Y-axis ----------- */
  heart(out) {
    const u  = Math.random() * Math.PI * 2;
    const s  = 0.055;
    const hx = 16 * Math.pow(Math.sin(u), 3);
    const hy = 13 * Math.cos(u) - 5 * Math.cos(2 * u)
             -  2 * Math.cos(3 * u) -     Math.cos(4 * u);
    // Fill interior with bias toward the outer curve
    const fill  = Math.pow(Math.random(), 0.5);
    const x     = hx * s * fill;
    const y     = hy * s * fill + 0.2;
    // 3D puffiness: sweep around Y axis for chunky heart
    const angle = (Math.random() - 0.5) * Math.PI * 0.75;
    out[0] = x * Math.cos(angle);
    out[1] = y;
    out[2] = x * Math.sin(angle);
  },

  /* Rose curve (rhodonea), 5 petals, with subtle 3D undulation */
  flower(out) {
    const k  = 5;                                   // petal count
    const u  = Math.random() * Math.PI * 2;
    const r  = Math.abs(Math.cos(k * u)) * 1.4;
    const rr = r * Math.pow(Math.random(), 0.55);   // fill from 0 → r
    const y  = (Math.random() - 0.5) * 0.08        // small random spread
             + Math.sin(u * k) * 0.08;              // petal curl
    out[0] = rr * Math.cos(u);
    out[1] = y;
    out[2] = rr * Math.sin(u);
  },

  /* Spiral galaxy — 4 logarithmic arms, flat disc with scatter */
  galaxy(out) {
    const arms  = 4;
    const maxR  = 1.55;
    const spin  = 1.7;
    const arm   = Math.floor(Math.random() * arms);
    const r     = Math.pow(Math.random(), 0.65) * maxR;
    const armA  = (Math.PI * 2) / arms;
    const noise = (Math.random() - 0.5) * 0.28;
    const angle = arm * armA + r * spin + noise;
    const yJit  = (Math.random() - 0.5) * 0.13 * (1 - r / maxR);
    out[0] = Math.cos(angle) * r;
    out[1] = yJit;
    out[2] = Math.sin(angle) * r;
  },

  /* Double-helix DNA: two strands + rung particles ------------- */
  helix(out) {
    const turns  = 4;
    const height = 2.6;
    const radius = 0.52;
    const p      = Math.random();

    if (p < 0.45) {
      // Strand A
      const q = Math.random();
      const s = q * turns * Math.PI * 2;
      out[0] = Math.cos(s) * radius;
      out[1] = q * height - height / 2;
      out[2] = Math.sin(s) * radius;
    } else if (p < 0.9) {
      // Strand B (offset by π)
      const q = Math.random();
      const s = q * turns * Math.PI * 2 + Math.PI;
      out[0] = Math.cos(s) * radius;
      out[1] = q * height - height / 2;
      out[2] = Math.sin(s) * radius;
    } else {
      // Ladder rungs
      const q     = Math.floor(Math.random() * 32) / 32;
      const along = Math.random();
      const s     = q * turns * Math.PI * 2;
      const x1    = Math.cos(s) * radius;
      const z1    = Math.sin(s) * radius;
      const x2    = Math.cos(s + Math.PI) * radius;
      const z2    = Math.sin(s + Math.PI) * radius;
      out[0] = x1 + (x2 - x1) * along;
      out[1] = q * height - height / 2;
      out[2] = z1 + (z2 - z1) * along;
    }
  },
};

const SHAPE_ORDER = ['sphere', 'torus', 'helix', 'galaxy', 'heart', 'flower'];
const SHAPE_NAMES = {
  sphere: 'SPHERE', torus: 'TORUS',   helix:  'HELIX',
  galaxy: 'GALAXY', heart: 'HEART',   flower: 'FLOWER',
};

/* ============================================================
   §4  SHAPE ICONS (inline SVG paths for buttons)
   ============================================================ */
const SHAPE_ICONS = {
  sphere: '<circle cx="12" cy="12" r="7.5"/><ellipse cx="12" cy="12" rx="7.5" ry="2.5"/>',
  torus:  '<ellipse cx="12" cy="12" rx="8" ry="3"/><ellipse cx="12" cy="12" rx="3" ry="1"/>',
  heart:  '<path d="M12 19.5 C 5.5 14.5, 3 10.5, 6 7.5 C 9 4.5, 12 8, 12 8 C 12 8, 15 4.5, 18 7.5 C 21 10.5, 18.5 14.5, 12 19.5 Z"/>',
  flower: '<circle cx="12" cy="6.5" r="3"/><circle cx="17.5" cy="12" r="3"/><circle cx="12" cy="17.5" r="3"/><circle cx="6.5" cy="12" r="3"/><circle cx="12" cy="12" r="1.8"/>',
  galaxy: '<path d="M5 12 C 5 6, 19 6, 19 12 C 19 18, 5 18, 5 12 Z" opacity="0.35"/><path d="M12 6 C 16 8, 16 16, 12 18 M12 6 C 8 8, 8 16, 12 18"/><circle cx="12" cy="12" r="1.5"/>',
  helix:  '<path d="M7 4 C 17 8, 17 16, 7 20"/><path d="M17 4 C 7 8, 7 16, 17 20"/><path d="M9 7 L 15 7 M9 12 L 15 12 M9 17 L 15 17" stroke-width="0.8" opacity="0.55"/>',
};

/* ============================================================
   §5  PARTICLE SPRITE TEXTURE
   Soft radial gradient → used in additive blending for glow.
   ============================================================ */
function createParticleTexture() {
  const size   = 128;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx    = canvas.getContext('2d');
  const g      = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0.0,  'rgba(255,255,255,1.0)');
  g.addColorStop(0.2,  'rgba(255,255,255,0.75)');
  g.addColorStop(0.5,  'rgba(255,255,255,0.15)');
  g.addColorStop(1.0,  'rgba(255,255,255,0.0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

/* ============================================================
   §6  PARTICLE SYSTEM
   Owns geometry, material, and per-frame position updates.
   ============================================================ */
class ParticleSystem {
  constructor(scene, count) {
    this.scene = scene;
    this.count = count;
    this._build();
  }

  /* Allocate buffers & build geometry/material ---------------- */
  _build() {
    const n = this.count;

    // Typed-array buffers (reused across frames — no GC churn)
    this.positions = new Float32Array(n * 3); // current rendered positions
    this.targets   = new Float32Array(n * 3); // shape target positions
    this.colors    = new Float32Array(n * 3); // per-particle color
    this.sizes     = new Float32Array(n);     // per-particle size multiplier
    this.seeds     = new Float32Array(n * 3); // noise seeds for idle drift

    // Seed random data
    for (let i = 0; i < n; i++) {
      const i3 = i * 3;
      this.seeds[i3]     = Math.random() * 1000;
      this.seeds[i3 + 1] = Math.random() * 1000;
      this.seeds[i3 + 2] = Math.random() * 1000;
      this.sizes[i]      = 0.5 + Math.random() * 0.75; // 0.5 .. 1.25
    }

    // Initial chaotic cloud — morph will smoothly pull these into shape
    for (let i = 0; i < n; i++) {
      const i3    = i * 3;
      const r     = Math.pow(Math.random(), 0.5) * 2.2;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      this.positions[i3]     = r * Math.sin(phi) * Math.cos(theta);
      this.positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      this.positions[i3 + 2] = r * Math.cos(phi);
    }

    // BufferGeometry with custom attributes
    this.geometry = new THREE.BufferGeometry();
    this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
    this.geometry.setAttribute('aColor',   new THREE.BufferAttribute(this.colors,    3));
    this.geometry.setAttribute('aSize',    new THREE.BufferAttribute(this.sizes,     1));

    // Point-sprite texture (created once per system)
    this.texture = createParticleTexture();

    // Custom shader material — additive blending for pure photonic glow
    this.material = new THREE.ShaderMaterial({
      uniforms: {
        uSize:       { value: CONFIG.sizeRaw / 1000 },
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
        uTexture:    { value: this.texture },
        uTime:       { value: 0 },
      },
      vertexShader: /* glsl */`
        attribute vec3  aColor;
        attribute float aSize;
        uniform   float uSize;
        uniform   float uPixelRatio;
        varying   vec3  vColor;

        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position  = projectionMatrix * mv;
          // Size attenuated by distance — closer = bigger (perspective-correct)
          gl_PointSize = aSize * uSize * 900.0 * uPixelRatio / -mv.z;
          vColor       = aColor;
        }
      `,
      fragmentShader: /* glsl */`
        uniform sampler2D uTexture;
        varying vec3     vColor;

        void main() {
          vec4 tex = texture2D(uTexture, gl_PointCoord);
          // Kill most transparent pixels for clean edges
          if (tex.a < 0.02) discard;
          // Hot core: small bright center that pushes color toward white
          vec2  uv   = gl_PointCoord - 0.5;
          float core = smoothstep(0.22, 0.0, length(uv));
          vec3  col  = vColor + core * 0.35;
          gl_FragColor = vec4(col, tex.a);
        }
      `,
      transparent:   true,
      depthWrite:    false,
      depthTest:     true,
      blending:      THREE.AdditiveBlending,
    });

    this.points = new THREE.Points(this.geometry, this.material);
    this.scene.add(this.points);

    // Populate initial shape & palette
    this.setShape(CONFIG.shape);
    this.setPalette(CONFIG.palette);
  }

  /* Generate new target positions for a named shape ----------- */
  setShape(name) {
    const gen = SHAPES[name] || SHAPES.sphere;
    const tmp = [0, 0, 0];
    const n   = this.count;
    for (let i = 0; i < n; i++) {
      gen(tmp);
      const i3 = i * 3;
      this.targets[i3]     = tmp[0];
      this.targets[i3 + 1] = tmp[1];
      this.targets[i3 + 2] = tmp[2];
    }
    CONFIG.shape = name;
  }

  /* Assign colors by random sampling the 3-stop palette ramp -- */
  setPalette(name) {
    const p   = PALETTES[name] || PALETTES.aurora;
    const c1  = new THREE.Color(p.colors[0]);
    const c2  = new THREE.Color(p.colors[1]);
    const c3  = new THREE.Color(p.colors[2]);
    const tmp = new THREE.Color();
    const n   = this.count;
    for (let i = 0; i < n; i++) {
      const t  = Math.random();
      if (t < 0.5) tmp.lerpColors(c1, c2, t * 2);
      else         tmp.lerpColors(c2, c3, (t - 0.5) * 2);
      const i3 = i * 3;
      this.colors[i3]     = tmp.r;
      this.colors[i3 + 1] = tmp.g;
      this.colors[i3 + 2] = tmp.b;
    }
    this.geometry.attributes.aColor.needsUpdate = true;
    CONFIG.palette = name;
  }

  setSize(raw) {
    this.material.uniforms.uSize.value = raw / 1000;
    CONFIG.sizeRaw = raw;
  }

  /* Main update: morph-lerp + idle drift + mouse repulsion ---- */
  update(time, mouseWorld, mouseActive) {
    const n            = this.count;
    const pos          = this.positions;
    const tgt          = this.targets;
    const seed         = this.seeds;
    const lerp         = CONFIG.morphLerp;
    const idleS        = CONFIG.idleStrength;
    const repelRadius  = CONFIG.repelRadius;
    const repelStr     = CONFIG.repelRaw / 100;
    const rr2          = repelRadius * repelRadius;
    const mx = mouseWorld.x, my = mouseWorld.y, mz = mouseWorld.z;

    for (let i = 0; i < n; i++) {
      const i3 = i * 3;

      // 1) IDLE DRIFT: gentle sinusoidal offset, per-particle phase seed
      const sx = seed[i3], sy = seed[i3 + 1], sz = seed[i3 + 2];
      const dx = Math.sin(time * 0.50 + sy) * idleS;
      const dy = Math.cos(time * 0.42 + sz) * idleS;
      const dz = Math.sin(time * 0.33 + sx) * idleS;

      // 2) Final target = shape target + idle drift
      const fx = tgt[i3]     + dx;
      const fy = tgt[i3 + 1] + dy;
      const fz = tgt[i3 + 2] + dz;

      // 3) Lerp current position toward final target
      pos[i3]     += (fx - pos[i3])     * lerp;
      pos[i3 + 1] += (fy - pos[i3 + 1]) * lerp;
      pos[i3 + 2] += (fz - pos[i3 + 2]) * lerp;

      // 4) MOUSE REPULSION: push particles away from pointer within radius
      if (mouseActive) {
        const ex = pos[i3]     - mx;
        const ey = pos[i3 + 1] - my;
        const ez = pos[i3 + 2] - mz;
        const d2 = ex*ex + ey*ey + ez*ez;
        if (d2 < rr2 && d2 > 0.0001) {
          const d     = Math.sqrt(d2);
          const falloff = 1 - d / repelRadius;
          const force = falloff * falloff * repelStr * 0.16;
          pos[i3]     += (ex / d) * force;
          pos[i3 + 1] += (ey / d) * force;
          pos[i3 + 2] += (ez / d) * force;
        }
      }
    }

    this.geometry.attributes.position.needsUpdate = true;
    this.material.uniforms.uTime.value = time;
  }

  /* Rebuild with new count (disposes old GPU resources) ------- */
  rebuild(newCount) {
    this.dispose();
    this.count = newCount;
    this._build();
  }

  /* WebGL memory management --------------------------------- */
  dispose() {
    this.scene.remove(this.points);
    this.geometry.dispose();
    this.material.dispose();
    this.texture.dispose();
  }
}

/* ============================================================
   §7  SCENE SETUP
   ============================================================ */
const canvas = document.getElementById('canvas');

const scene = new THREE.Scene();
// Atmospheric fog gives depth to the particle field
scene.fog = new THREE.FogExp2(0x030305, 0.09);

const camera = new THREE.PerspectiveCamera(
  55,                                          // fov
  window.innerWidth / window.innerHeight,      // aspect
  0.1, 100                                     // near/far
);
camera.position.set(0, 0.2, 3.3);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias:        true,
  alpha:            false,
  powerPreference:  'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x030305, 1);

const clock     = new THREE.Clock();
const particles = new ParticleSystem(scene, CONFIG.count);
const panelEl   = document.querySelector('.panel');

// Drag-based orbit state (camera rotates around the particle field)
const cameraOrbit = {
  radius:      3.35,
  yaw:         0,
  pitch:       0.06,
  targetYaw:   0,
  targetPitch: 0.06,
  damping:     0.12,
  dragSpeed:   0.005,
  minPitch:   -1.1,
  maxPitch:    1.1,
};

let isDragging = false;
let dragPointerId = null;
let dragStartX = 0;
let dragStartY = 0;
let dragLastX = 0;
let dragLastY = 0;
let dragDistance = 0;
let suppressNextClick = false;

function resetPanelTilt() {
  if (!panelEl) return;
  panelEl.style.setProperty('--panel-tilt-x', '0deg');
  panelEl.style.setProperty('--panel-tilt-y', '0deg');
  panelEl.style.setProperty('--panel-shine-x', '50%');
  panelEl.style.setProperty('--panel-shine-y', '35%');
}

function updatePanelTilt(x, y) {
  if (!panelEl || window.innerWidth <= 760) {
    resetPanelTilt();
    return;
  }

  const rect = panelEl.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  const px = (x - rect.left) / rect.width;
  const py = (y - rect.top) / rect.height;

  if (px < 0 || px > 1 || py < 0 || py > 1) {
    panelEl.style.setProperty('--panel-tilt-x', '0deg');
    panelEl.style.setProperty('--panel-tilt-y', '0deg');
    return;
  }

  const tiltY = (px - 0.5) * 9;
  const tiltX = (0.5 - py) * 7;
  panelEl.style.setProperty('--panel-tilt-x', `${tiltX.toFixed(2)}deg`);
  panelEl.style.setProperty('--panel-tilt-y', `${tiltY.toFixed(2)}deg`);
  panelEl.style.setProperty('--panel-shine-x', `${(px * 100).toFixed(1)}%`);
  panelEl.style.setProperty('--panel-shine-y', `${(py * 100).toFixed(1)}%`);
}

if (panelEl) {
  panelEl.addEventListener('pointerleave', resetPanelTilt);
}

/* ============================================================
   §8  MOUSE / POINTER TRACKING
   Raycasts NDC cursor against z=0 plane to get world position.
   ============================================================ */
const mouseNDC   = new THREE.Vector2(-10, -10);
const mouseWorld = new THREE.Vector3();
const raycaster  = new THREE.Raycaster();
const plane      = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
let mouseActive     = false;
let mouseLastMoved  = 0;

function projectMouse() {
  raycaster.setFromCamera(mouseNDC, camera);
  raycaster.ray.intersectPlane(plane, mouseWorld);
}

function setMouse(x, y) {
  mouseNDC.x =   (x / window.innerWidth)  * 2 - 1;
  mouseNDC.y = -((y / window.innerHeight) * 2 - 1);
  mouseActive    = true;
  mouseLastMoved = performance.now();
}

window.addEventListener('pointermove', e => {
  setMouse(e.clientX, e.clientY);
  updateCursor(e.clientX, e.clientY);
  updatePanelTilt(e.clientX, e.clientY);
});
window.addEventListener('pointerleave', () => {
  mouseActive = false;
  resetPanelTilt();
});

canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  isDragging = true;
  dragPointerId = e.pointerId;
  dragStartX = dragLastX = e.clientX;
  dragStartY = dragLastY = e.clientY;
  dragDistance = 0;
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (!isDragging || e.pointerId !== dragPointerId) return;

  const dx = e.clientX - dragLastX;
  const dy = e.clientY - dragLastY;
  dragLastX = e.clientX;
  dragLastY = e.clientY;

  dragDistance += Math.abs(dx) + Math.abs(dy);

  cameraOrbit.targetYaw   -= dx * cameraOrbit.dragSpeed;
  cameraOrbit.targetPitch -= dy * cameraOrbit.dragSpeed;
  cameraOrbit.targetPitch = THREE.MathUtils.clamp(
    cameraOrbit.targetPitch,
    cameraOrbit.minPitch,
    cameraOrbit.maxPitch
  );
});

function endDrag(e) {
  if (!isDragging || e.pointerId !== dragPointerId) return;
  isDragging = false;
  canvas.releasePointerCapture(e.pointerId);
  dragPointerId = null;
  // Ignore click morph after a drag gesture
  suppressNextClick = dragDistance > 6;
}

canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

/* ============================================================
   §9  CUSTOM CURSOR
   ============================================================ */
const cursorEl = document.getElementById('cursor');
function updateCursor(x, y) {
  cursorEl.style.transform = `translate3d(${x}px, ${y}px, 0)`;
}

/* ============================================================
   §10  INTERACTIONS: click to morph, drag to rotate in 3D
   ============================================================ */
canvas.addEventListener('click', () => {
  if (suppressNextClick) {
    suppressNextClick = false;
    return;
  }
  cycleShape(1);
  cursorEl.classList.add('active');
  setTimeout(() => cursorEl.classList.remove('active'), 450);
});

function cycleShape(dir) {
  const idx  = SHAPE_ORDER.indexOf(CONFIG.shape);
  const next = (idx + dir + SHAPE_ORDER.length) % SHAPE_ORDER.length;
  selectShape(SHAPE_ORDER[next]);
}

function selectShape(name) {
  particles.setShape(name);
  document.querySelectorAll('.shape-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.shape === name));
  const nice = SHAPE_NAMES[name];
  document.getElementById('shape-value').textContent = nice;
  document.getElementById('shape-name').textContent  = nice;
}

function selectPalette(name) {
  particles.setPalette(name);
  document.querySelectorAll('.palette-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.palette === name));
  const nice = PALETTES[name].name;
  document.getElementById('palette-value').textContent = nice;
  document.getElementById('palette-name').textContent  = nice;
  applyPaletteTheme(name);
}

/* ============================================================
   §11  BUILD UI (shape buttons, palette swatches, sliders)
   ============================================================ */
const shapeGrid = document.getElementById('shape-grid');
SHAPE_ORDER.forEach(shape => {
  const btn = document.createElement('button');
  btn.className      = 'shape-btn' + (shape === CONFIG.shape ? ' active' : '');
  btn.dataset.shape  = shape;
  btn.innerHTML      = `
    <svg viewBox="0 0 24 24">${SHAPE_ICONS[shape]}</svg>
    <span>${SHAPE_NAMES[shape]}</span>`;
  btn.addEventListener('click', () => selectShape(shape));
  shapeGrid.appendChild(btn);
});

const paletteGrid = document.getElementById('palette-grid');
Object.entries(PALETTES).forEach(([key, p]) => {
  const btn = document.createElement('button');
  btn.className         = 'palette-btn' + (key === CONFIG.palette ? ' active' : '');
  btn.dataset.palette   = key;
  btn.title             = p.name;
  btn.style.background  = `linear-gradient(135deg, ${p.colors[0]}, ${p.colors[1]} 50%, ${p.colors[2]})`;
  btn.addEventListener('click', () => selectPalette(key));
  paletteGrid.appendChild(btn);
});

applyPaletteTheme(CONFIG.palette);

const densityInput   = document.getElementById('density');
const densityValue   = document.getElementById('density-value');
const countDisplay   = document.getElementById('count');
let densityDebounce;
densityInput.addEventListener('input', e => {
  const v = parseInt(e.target.value);
  densityValue.textContent = v;
  countDisplay.textContent = v;
  clearTimeout(densityDebounce);
  // Debounce rebuild — avoids thrashing the GPU while the user drags
  densityDebounce = setTimeout(() => particles.rebuild(v), 130);
});

const sizeInput  = document.getElementById('size');
const sizeValue  = document.getElementById('size-value');
sizeInput.addEventListener('input', e => {
  const v = parseInt(e.target.value);
  particles.setSize(v);
  sizeValue.textContent = (v / 1000).toFixed(3);
});

const repelInput = document.getElementById('repel');
const repelValue = document.getElementById('repel-value');
repelInput.addEventListener('input', e => {
  const v = parseInt(e.target.value);
  CONFIG.repelRaw = v;
  repelValue.textContent = (v / 100).toFixed(2);
});

/* ============================================================
   §12  FPS COUNTER
   ============================================================ */
const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsLast = performance.now();
function tickFps() {
  fpsFrames++;
  const now = performance.now();
  if (now - fpsLast > 500) {
    fpsEl.textContent = Math.round((fpsFrames * 1000) / (now - fpsLast));
    fpsFrames = 0;
    fpsLast   = now;
  }
}

/* ============================================================
   §13  ANIMATION LOOP  (requestAnimationFrame, 60fps target)
   ============================================================ */
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  projectMouse();

  // Smoothly ease toward drag target for responsive but stable 3D control
  cameraOrbit.yaw += (cameraOrbit.targetYaw - cameraOrbit.yaw) * cameraOrbit.damping;
  cameraOrbit.pitch += (cameraOrbit.targetPitch - cameraOrbit.pitch) * cameraOrbit.damping;

  const cp = Math.cos(cameraOrbit.pitch);
  camera.position.x = Math.sin(cameraOrbit.yaw) * cp * cameraOrbit.radius;
  camera.position.y = Math.sin(cameraOrbit.pitch) * cameraOrbit.radius;
  camera.position.z = Math.cos(cameraOrbit.yaw) * cp * cameraOrbit.radius;
  camera.lookAt(0, 0, 0);

  // Auto-deactivate mouse repel after 2.5s of inactivity
  if (mouseActive && performance.now() - mouseLastMoved > 2500) {
    mouseActive = false;
  }

  particles.update(t, mouseWorld, mouseActive);
  renderer.render(scene, camera);

  tickFps();
}
animate();

// Remove loading overlay once first frame is rendered
requestAnimationFrame(() => {
  document.getElementById('loading').classList.add('gone');
  document.body.classList.add('ready');
});

/* ============================================================
   §14  RESIZE HANDLER
   ============================================================ */
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  const pr = Math.min(window.devicePixelRatio, 2);
  renderer.setPixelRatio(pr);
  particles.material.uniforms.uPixelRatio.value = pr;
  if (w <= 760) resetPanelTilt();
});

/* ============================================================
   §15  CLEANUP ON UNLOAD
   ============================================================ */
window.addEventListener('beforeunload', () => {
  particles.dispose();
  renderer.dispose();
});
</script>
