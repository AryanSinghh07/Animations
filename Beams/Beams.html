<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beams</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #app::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.24) 0.7px, transparent 0.9px);
      background-size: 3px 3px;
      opacity: 0.08;
      mix-blend-mode: screen;
    }

    #app canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const CONFIG = {
      beamWidth: 4.2,
      beamHeight: 30,
      beamNumber: 7,
      beamGap: 1.1,
      lightColor: '#f8f8f8',
      speed: 1.7,
      noiseIntensity: 1.4,
      scale: 0.18,
      rotation: -30,
    };

    function extendMaterial(BaseMaterial, cfg) {
      const physical = THREE.ShaderLib.physical;
      const { vertexShader: baseVert, fragmentShader: baseFrag, uniforms: baseUniforms } = physical;
      const baseDefines = physical.defines ?? {};

      const uniforms = THREE.UniformsUtils.clone(baseUniforms);
      const defaults = new BaseMaterial(cfg.material || {});

      if (defaults.color) uniforms.diffuse.value = defaults.color;
      if ('roughness' in defaults) uniforms.roughness.value = defaults.roughness;
      if ('metalness' in defaults) uniforms.metalness.value = defaults.metalness;
      if ('envMap' in defaults) uniforms.envMap.value = defaults.envMap;
      if ('envMapIntensity' in defaults) uniforms.envMapIntensity.value = defaults.envMapIntensity;

      Object.entries(cfg.uniforms ?? {}).forEach(([key, u]) => {
        uniforms[key] = u !== null && typeof u === 'object' && 'value' in u ? u : { value: u };
      });

      let vert = `${cfg.header}\n${cfg.vertexHeader ?? ''}\n${baseVert}`;
      let frag = `${cfg.header}\n${cfg.fragmentHeader ?? ''}\n${baseFrag}`;

      for (const [inc, code] of Object.entries(cfg.vertex ?? {})) {
        vert = vert.replace(inc, `${inc}\n${code}`);
      }
      for (const [inc, code] of Object.entries(cfg.fragment ?? {})) {
        frag = frag.replace(inc, `${inc}\n${code}`);
      }

      return new THREE.ShaderMaterial({
        defines: { ...baseDefines, USE_UV: '' },
        uniforms,
        vertexShader: vert,
        fragmentShader: frag,
        lights: true,
        fog: false,
      });
    }

    const noise = `
float random(in vec2 st) {
  return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
}
float noise(in vec2 st) {
  vec2 i = floor(st);
  vec2 f = fract(st);
  float a = random(i);
  float b = random(i + vec2(1.0, 0.0));
  float c = random(i + vec2(0.0, 1.0));
  float d = random(i + vec2(1.0, 1.0));
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(a, b, u.x) +
         (c - a) * u.y * (1.0 - u.x) +
         (d - b) * u.x * u.y;
}
vec4 permute(vec4 x) { return mod(((x * 34.0) + 1.0) * x, 289.0); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
vec3 fade(vec3 t) { return t * t * t * (t * (t * 6.0 - 15.0) + 10.0); }
float cnoise(vec3 P) {
  vec3 Pi0 = floor(P);
  vec3 Pi1 = Pi0 + vec3(1.0);
  Pi0 = mod(Pi0, 289.0);
  Pi1 = mod(Pi1, 289.0);
  vec3 Pf0 = fract(P);
  vec3 Pf1 = Pf0 - vec3(1.0);
  vec4 ix = vec4(Pi0.x, Pi1.x, Pi0.x, Pi1.x);
  vec4 iy = vec4(Pi0.yy, Pi1.yy);
  vec4 iz0 = Pi0.zzzz;
  vec4 iz1 = Pi1.zzzz;
  vec4 ixy = permute(permute(ix) + iy);
  vec4 ixy0 = permute(ixy + iz0);
  vec4 ixy1 = permute(ixy + iz1);
  vec4 gx0 = ixy0 / 7.0;
  vec4 gy0 = fract(floor(gx0) / 7.0) - 0.5;
  gx0 = fract(gx0);
  vec4 gz0 = vec4(0.5) - abs(gx0) - abs(gy0);
  vec4 sz0 = step(gz0, vec4(0.0));
  gx0 -= sz0 * (step(0.0, gx0) - 0.5);
  gy0 -= sz0 * (step(0.0, gy0) - 0.5);
  vec4 gx1 = ixy1 / 7.0;
  vec4 gy1 = fract(floor(gx1) / 7.0) - 0.5;
  gx1 = fract(gx1);
  vec4 gz1 = vec4(0.5) - abs(gx1) - abs(gy1);
  vec4 sz1 = step(gz1, vec4(0.0));
  gx1 -= sz1 * (step(0.0, gx1) - 0.5);
  gy1 -= sz1 * (step(0.0, gy1) - 0.5);
  vec3 g000 = vec3(gx0.x, gy0.x, gz0.x);
  vec3 g100 = vec3(gx0.y, gy0.y, gz0.y);
  vec3 g010 = vec3(gx0.z, gy0.z, gz0.z);
  vec3 g110 = vec3(gx0.w, gy0.w, gz0.w);
  vec3 g001 = vec3(gx1.x, gy1.x, gz1.x);
  vec3 g101 = vec3(gx1.y, gy1.y, gz1.y);
  vec3 g011 = vec3(gx1.z, gy1.z, gz1.z);
  vec3 g111 = vec3(gx1.w, gy1.w, gz1.w);
  vec4 norm0 = taylorInvSqrt(vec4(dot(g000, g000), dot(g010, g010), dot(g100, g100), dot(g110, g110)));
  g000 *= norm0.x;
  g010 *= norm0.y;
  g100 *= norm0.z;
  g110 *= norm0.w;
  vec4 norm1 = taylorInvSqrt(vec4(dot(g001, g001), dot(g011, g011), dot(g101, g101), dot(g111, g111)));
  g001 *= norm1.x;
  g011 *= norm1.y;
  g101 *= norm1.z;
  g111 *= norm1.w;
  float n000 = dot(g000, Pf0);
  float n100 = dot(g100, vec3(Pf1.x, Pf0.yz));
  float n010 = dot(g010, vec3(Pf0.x, Pf1.y, Pf0.z));
  float n110 = dot(g110, vec3(Pf1.xy, Pf0.z));
  float n001 = dot(g001, vec3(Pf0.xy, Pf1.z));
  float n101 = dot(g101, vec3(Pf1.x, Pf0.y, Pf1.z));
  float n011 = dot(g011, vec3(Pf0.x, Pf1.yz));
  float n111 = dot(g111, Pf1);
  vec3 fade_xyz = fade(Pf0);
  vec4 n_z = mix(vec4(n000, n100, n010, n110), vec4(n001, n101, n011, n111), fade_xyz.z);
  vec2 n_yz = mix(n_z.xy, n_z.zw, fade_xyz.y);
  float n_xyz = mix(n_yz.x, n_yz.y, fade_xyz.x);
  return 2.2 * n_xyz;
}
`;

    function createStackedPlanesBufferGeometry(n, width, height, spacing, heightSegments) {
      const geometry = new THREE.BufferGeometry();
      const numVertices = n * (heightSegments + 1) * 2;
      const numFaces = n * heightSegments * 2;
      const positions = new Float32Array(numVertices * 3);
      const indices = new Uint32Array(numFaces * 3);
      const uvs = new Float32Array(numVertices * 2);

      let vertexOffset = 0;
      let indexOffset = 0;
      let uvOffset = 0;
      const totalWidth = n * width + (n - 1) * spacing;
      const xOffsetBase = -totalWidth / 2;

      for (let i = 0; i < n; i++) {
        const xOffset = xOffsetBase + i * (width + spacing);
        const uvXOffset = Math.random() * 200;
        const uvYOffset = Math.random() * 200;

        for (let j = 0; j <= heightSegments; j++) {
          const y = height * (j / heightSegments - 0.5);
          const v0 = [xOffset, y, 0];
          const v1 = [xOffset + width, y, 0];
          positions.set([...v0, ...v1], vertexOffset * 3);

          const uvY = j / heightSegments;
          uvs.set([uvXOffset, uvY + uvYOffset, uvXOffset + 1, uvY + uvYOffset], uvOffset);

          if (j < heightSegments) {
            const a = vertexOffset;
            const b = vertexOffset + 1;
            const c = vertexOffset + 2;
            const d = vertexOffset + 3;
            indices.set([a, b, c, c, b, d], indexOffset);
            indexOffset += 6;
          }

          vertexOffset += 2;
          uvOffset += 4;
        }
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
      geometry.setIndex(new THREE.BufferAttribute(indices, 1));
      geometry.computeVertexNormals();
      return geometry;
    }

    const root = document.getElementById('app');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.95;
    root.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(26, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 26);

    const group = new THREE.Group();
    group.rotation.z = THREE.MathUtils.degToRad(CONFIG.rotation);
    scene.add(group);

    const beamMaterial = extendMaterial(THREE.MeshStandardMaterial, {
      header: `
varying vec2 vBeamUv;
uniform float time;
uniform float uSpeed;
uniform float uNoiseIntensity;
uniform float uScale;
uniform vec2 uResolution;
${noise}`,
      vertexHeader: `
float getPos(vec3 pos) {
  vec3 noisePos = vec3(pos.x * 0.0, pos.y - uv.y, pos.z + time * uSpeed * 3.0) * uScale;
  return cnoise(noisePos);
}
vec3 getCurrentPos(vec3 pos) {
  vec3 newpos = pos;
  newpos.z += getPos(pos);
  return newpos;
}
vec3 getNormal(vec3 pos) {
  vec3 curpos = getCurrentPos(pos);
  vec3 nextposX = getCurrentPos(pos + vec3(0.01, 0.0, 0.0));
  vec3 nextposY = getCurrentPos(pos + vec3(0.0, 0.01, 0.0));
  vec3 tangentX = normalize(nextposX - curpos);
  vec3 tangentY = normalize(nextposY - curpos);
  return normalize(cross(tangentY, tangentX));
}`,
      vertex: {
        '#include <begin_vertex>': `
vBeamUv = uv;
transformed.z += getPos(transformed.xyz);`,
        '#include <beginnormal_vertex>': 'objectNormal = getNormal(position.xyz);',
      },
      fragment: {
        '#include <dithering_fragment>': `
vec2 beamUv = fract(vBeamUv);
float edgeMask = smoothstep(0.02, 0.2, beamUv.x) * (1.0 - smoothstep(0.8, 0.98, beamUv.x));

float topGlow = exp(-pow((beamUv.y - 0.16) * 4.8, 2.0));
float bottomGlow = exp(-pow((beamUv.y - 0.84) * 4.8, 2.0));
float lobe = clamp(topGlow + bottomGlow, 0.0, 1.0);

float yNorm = gl_FragCoord.y / uResolution.y;
float centerCut = smoothstep(0.07, 0.22, abs(yNorm - 0.5));

float grain = (noise(gl_FragCoord.xy * 0.95 + vec2(time * 80.0, time * 41.0)) - 0.5) * 0.35 * uNoiseIntensity;
float base = 0.05 + lobe * 0.95;
float beam = base * edgeMask * centerCut + grain;
beam = clamp(beam, 0.0, 1.0);

float lum = dot(gl_FragColor.rgb, vec3(0.2126, 0.7152, 0.0722));
float value = clamp(lum * 0.16 + beam, 0.0, 1.0);
gl_FragColor.rgb = vec3(value);`,
      },
      material: {
        color: new THREE.Color(CONFIG.lightColor),
        roughness: 0.35,
        metalness: 0.15,
      },
      uniforms: {
        time: { value: 0 },
        uSpeed: { value: CONFIG.speed },
        uNoiseIntensity: { value: CONFIG.noiseIntensity },
        uScale: { value: CONFIG.scale },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      },
    });

    const geometry = createStackedPlanesBufferGeometry(
      CONFIG.beamNumber,
      CONFIG.beamWidth,
      CONFIG.beamHeight,
      CONFIG.beamGap,
      140
    );

    const mesh = new THREE.Mesh(geometry, beamMaterial);
    group.add(mesh);

    const key = new THREE.DirectionalLight(0xffffff, 0.9);
    key.position.set(0, 4, 12);
    scene.add(key);

    const fill = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(fill);

    const pointer = new THREE.Vector2(0, 0);

    function onPointerMove(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    const clock = new THREE.Clock();
    let rafId = 0;

    function animate() {
      const t = clock.getElapsedTime();
      beamMaterial.uniforms.time.value = t;

      const targetX = -pointer.y * 0.06;
      const targetY = pointer.x * 0.08;
      group.rotation.x += (targetX - group.rotation.x) * 0.04;
      group.rotation.y += (targetY - group.rotation.y) * 0.04;

      renderer.render(scene, camera);
      rafId = requestAnimationFrame(animate);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      beamMaterial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', onResize);
    window.addEventListener('pointermove', onPointerMove, { passive: true });
    rafId = requestAnimationFrame(animate);

    window.addEventListener('beforeunload', () => {
      cancelAnimationFrame(rafId);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('pointermove', onPointerMove);
      beamMaterial.dispose();
      geometry.dispose();
      renderer.dispose();
    });
  </script>
</body>
</html>
