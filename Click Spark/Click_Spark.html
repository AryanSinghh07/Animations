<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Spark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: linear-gradient(135deg, #0f0820 0%, #1a0f2e 50%, #0a0515 100%);
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    /* ── ClickSpark container (exact React inline styles) ── */
    #spark-root {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #spark-canvas {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }

    /* ── Demo content (children) ── */
    #content {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      pointer-events: none;
    }

    .hero-title {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a855f7 0%, #3b82f6 50%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      margin: 0;
    }
    .hero-sub {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(168,85,247,0.7);
      font-weight: 500;
    }

    /* Demo cards */
    .cards {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      pointer-events: none;
      margin-top: 20px;
    }
    .card {
      width: 150px; height: 85px;
      border: 1.5px solid rgba(168,85,247,0.25);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(59,130,246,0.05));
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(168,85,247,0.08);
    }
    .card:hover {
      border-color: rgba(168,85,247,0.4);
      background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(59,130,246,0.08));
      color: rgba(255,255,255,0.65);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(168,85,247,0.15);
    }

    /* ── Controls panel ── */
    #panel {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px; justify-items: center;
      padding: 14px 24px;
      background: rgba(8,8,16,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 16px;
      z-index: 10;
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(168,85,247,0.12), inset 0 1px 1px rgba(255,255,255,0.1);
      max-width: 90vw;
    }

    .ctrl {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .ctrl:first-child {
      grid-column: 1 / -1;
    }
    .ctrl label {
      font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      white-space: nowrap;
    }
    .ctrl input[type=range] {
      width: 80px; height: 4px; accent-color: #a855f7; cursor: pointer;
      border-radius: 2px;
      background: linear-gradient(to right, rgba(168,85,247,0.1), rgba(168,85,247,0.2));
      -webkit-appearance: none;
      appearance: none;
    }
    .ctrl input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #d946ef);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 6px rgba(168,85,247,0.35);
    }
    .ctrl input[type=range]::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #d946ef);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 6px rgba(168,85,247,0.35);
    }
    .ctrl select {
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 6px; color: rgba(255,255,255,0.6);
      font-size: 0.62rem; padding: 4px 6px; cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .ctrl select:hover {
      background: rgba(168,85,247,0.12);
      border-color: rgba(168,85,247,0.4);
    }
    .ctrl span {
      font-size: 0.58rem; color: rgba(168,85,247,0.65); font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    /* Color swatches */
    .swatch-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .swatch {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 6px rgba(0,0,0,0.4);
    }
    .swatch:hover {
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(168,85,247,0.3);
    }
    .swatch.active { 
      border-color: #ffffff;
      box-shadow: 0 0 12px rgba(168,85,247,0.5), 0 0 6px currentColor;
      transform: scale(1.15);
    }
  </style>
</head>
<body>

<div id="spark-root">
  <canvas id="spark-canvas"></canvas>

  <!-- children (demo content) -->
  <div id="content">
    <p class="hero-sub">Click anywhere to spark</p>
    <h1 class="hero-title">Click<br>Spark</h1>
    <div class="cards">
      <div class="card">Click me</div>
      <div class="card">Anywhere</div>
      <div class="card">Try it!</div>
    </div>
  </div>
</div>

<!-- Controls -->
<div id="panel">
  <div class="ctrl">
    <label>Color</label>
    <div class="swatch-row" id="swatches"></div>
  </div>
  <div class="ctrl">
    <label>Spark Size</label>
    <input type="range" id="sparkSize" min="2" max="40" step="1" value="10">
    <span id="sparkSizeVal">10</span>
  </div>
  <div class="ctrl">
    <label>Radius</label>
    <input type="range" id="sparkRadius" min="5" max="80" step="1" value="15">
    <span id="sparkRadiusVal">15</span>
  </div>
  <div class="ctrl">
    <label>Count</label>
    <input type="range" id="sparkCount" min="2" max="24" step="1" value="8">
    <span id="sparkCountVal">8</span>
  </div>
  <div class="ctrl">
    <label>Duration (ms)</label>
    <input type="range" id="duration" min="100" max="1200" step="50" value="400">
    <span id="durationVal">400</span>
  </div>
  <div class="ctrl">
    <label>Extra Scale</label>
    <input type="range" id="extraScale" min="0.2" max="4" step="0.1" value="1">
    <span id="extraScaleVal">1.0</span>
  </div>
  <div class="ctrl">
    <label>Easing</label>
    <select id="easing">
      <option value="ease-out" selected>ease-out</option>
      <option value="ease-in">ease-in</option>
      <option value="ease-in-out">ease-in-out</option>
      <option value="linear">linear</option>
    </select>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG  (default props from React component)
// ═══════════════════════════════════════════════════
const CFG = {
  sparkColor:  '#fff',
  sparkSize:   10,
  sparkRadius: 15,
  sparkCount:  8,
  duration:    400,
  easing:      'ease-out',
  extraScale:  1.0,
};

// ═══════════════════════════════════════════════════
//  CANVAS SETUP  (exact ResizeObserver logic from React)
// ═══════════════════════════════════════════════════
const canvas   = document.getElementById('spark-canvas');
const sparkRoot = document.getElementById('spark-root');
const ctx      = canvas.getContext('2d');
let resizeTimeout;

const resizeCanvas = () => {
  const { width, height } = sparkRoot.getBoundingClientRect();
  if (canvas.width !== width || canvas.height !== height) {
    canvas.width  = width;
    canvas.height = height;
  }
};
const handleResize = () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(resizeCanvas, 100);
};
new ResizeObserver(handleResize).observe(sparkRoot);
resizeCanvas();

// ═══════════════════════════════════════════════════
//  EASING  (exact switch from React source)
// ═══════════════════════════════════════════════════
function easeFunc(t) {
  switch (CFG.easing) {
    case 'linear':      return t;
    case 'ease-in':     return t * t;
    case 'ease-in-out': return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
    default:            return t * (2 - t);   // ease-out
  }
}

// ═══════════════════════════════════════════════════
//  SPARKS STORE  (ref equivalent)
// ═══════════════════════════════════════════════════
let sparks = [];

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP  (exact draw() logic from React)
// ═══════════════════════════════════════════════════
function draw(timestamp) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  sparks = sparks.filter(spark => {
    const elapsed = timestamp - spark.startTime;
    if (elapsed >= CFG.duration) return false;

    const progress = elapsed / CFG.duration;
    const eased    = easeFunc(progress);

    const distance   = eased * CFG.sparkRadius * CFG.extraScale;
    const lineLength = CFG.sparkSize * (1 - eased);

    const x1 = spark.x + distance * Math.cos(spark.angle);
    const y1 = spark.y + distance * Math.sin(spark.angle);
    const x2 = spark.x + (distance + lineLength) * Math.cos(spark.angle);
    const y2 = spark.y + (distance + lineLength) * Math.sin(spark.angle);

    ctx.strokeStyle = CFG.sparkColor;
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    return true;
  });

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ═══════════════════════════════════════════════════
//  CLICK HANDLER  (exact handleClick from React)
// ═══════════════════════════════════════════════════
sparkRoot.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x    = e.clientX - rect.left;
  const y    = e.clientY - rect.top;
  const now  = performance.now();

  const newSparks = Array.from({ length: CFG.sparkCount }, (_, i) => ({
    x, y,
    angle:     (2 * Math.PI * i) / CFG.sparkCount,
    startTime: now,
  }));
  sparks.push(...newSparks);
});

// ═══════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════

// Color swatches
const COLORS = [
  { label: 'White',    hex: '#ffffff' },
  { label: 'Purple',   hex: '#a855f7' },
  { label: 'Cyan',     hex: '#06b6d4' },
  { label: 'Pink',     hex: '#ec4899' },
  { label: 'Amber',    hex: '#fbbf24' },
  { label: 'Green',    hex: '#22c55e' },
  { label: 'Red',      hex: '#ef4444' },
];
const swatchRow = document.getElementById('swatches');
COLORS.forEach(c => {
  const btn = document.createElement('div');
  btn.className = 'swatch' + (c.hex === CFG.sparkColor ? ' active' : '');
  btn.title = c.label;
  btn.style.background = c.hex;
  btn.addEventListener('click', e => {
    e.stopPropagation();
    CFG.sparkColor = c.hex;
    swatchRow.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
  });
  swatchRow.appendChild(btn);
});

// Slider binder
function bindSlider(id, key, fixed) {
  const el  = document.getElementById(id);
  const val = document.getElementById(id + 'Val');
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    CFG[key] = (key === 'sparkCount') ? Math.round(v) : v;
    val.textContent = fixed != null ? v.toFixed(fixed) : String(Math.round(v));
  });
}
bindSlider('sparkSize',   'sparkSize',   0);
bindSlider('sparkRadius', 'sparkRadius', 0);
bindSlider('sparkCount',  'sparkCount',  null);
bindSlider('duration',    'duration',    0);
bindSlider('extraScale',  'extraScale',  1);

document.getElementById('easing').addEventListener('change', e => {
  CFG.easing = e.target.value;
});

// Stop panel clicks from spawning sparks
document.getElementById('panel').addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
