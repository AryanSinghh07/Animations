<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falling Text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, rgba(168,85,247,0.18), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(59,130,246,0.12), transparent 24%),
        linear-gradient(180deg, #090912 0%, #06070d 100%);
      color: #fff;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
      opacity: 0.35;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 24px 88px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero {
      display: grid;
      gap: 12px;
      text-align: center;
      justify-items: center;
      padding-bottom: 4px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.62);
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 0.02em;
      line-height: 0.92;
      text-wrap: balance;
    }

    .hero p {
      max-width: 54ch;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 4px;
    }

    .falling-text-container {
      position: relative;
      width: 100%;
      cursor: pointer;
      text-align: center;
      padding: 34px 20px 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(12,14,24,0.9);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    /* The text div — words live here */
    .falling-text-words {
      display: inline-block;
      line-height: 1.4;
      pointer-events: none;
      max-width: 100%;
    }

    /* Matter.js canvas sits behind text */
    .falling-text-canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Word spans */
    .word-span {
      display: inline-block;
      margin: 0 4px;
      user-select: none;
      position: relative;
      z-index: 1;
      white-space: nowrap;
    }
    .word-span.highlight {
      color: #f5d0fe;
      font-weight: 700;
      text-shadow: 0 0 18px rgba(216,180,254,0.22);
    }

    .trigger-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.56);
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      background: rgba(255,255,255,0.03);
    }
    .trigger-hint svg { opacity: .7; }

    .reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.62);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 7px 14px;
      cursor: pointer;
      transition: transform .2s, background .2s, color .2s, border-color .2s;
    }
    .reset-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.16); }

    .status-note {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.02em;
    }

    @media (max-width: 640px) {
      .page { padding: 56px 16px 72px; }
      .toolbar { align-items: flex-start; }
      .falling-text-container { padding: 28px 14px 20px; border-radius: 22px; }
    }

  </style>
</head>
<body>

<div class="page">

  <header class="hero">
    <span class="eyebrow">Physics animation</span>
    <h1>Falling Text</h1>
    <p>Click the box and the words drop into place with soft, playful motion. You can drag them around once the simulation starts.</p>
  </header>

  <div class="toolbar">
    <span class="status-note">Click the panel to start the effect.</span>
    <button class="reset-btn" id="resetBtn">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M9 5A4 4 0 1 1 7.5 1.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M6.5 1 8 1.8l-.8 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Reset
    </button>
  </div>

  <!-- The falling text container -->
  <div id="fallingContainer" class="falling-text-container" style="height: 340px;">
    <div id="fallingWords" class="falling-text-words" style="font-size: 1.9rem;"></div>
    <div id="fallingCanvas" class="falling-text-canvas"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
//  FallingText — vanilla JS port of React component
// ═══════════════════════════════════════════════════

// Default config
const CONFIG = {
  text:                    'Every word falls and bounces — drag them with your mouse to interact with the physics simulation!',
  highlightWords:          ['falls', 'bounces', 'drag', 'physics'],
  trigger:                 'click',
  backgroundColor:         'transparent',
  wireframes:              false,
  gravity:                 1,
  mouseConstraintStiffness: 0.2,
  fontSize:                '1.9rem',
};

// DOM refs
const containerEl = document.getElementById('fallingContainer');
const wordsEl     = document.getElementById('fallingWords');
const canvasEl    = document.getElementById('fallingCanvas');

let effectStarted  = false;
let matterCleanup  = null;
let rafId          = null;
let scrollObserver = null;

// ─────────────────────────────────────────────────
//  Step 1 — Render word spans into DOM
// ─────────────────────────────────────────────────
function buildWords() {
  const words = CONFIG.text.split(' ');
  wordsEl.innerHTML = words.map(word => {
    const isHighlighted = CONFIG.highlightWords.some(hw => word.startsWith(hw));
    return `<span class="word-span${isHighlighted ? ' highlight' : ''}">${word}</span>`;
  }).join(' ');
  wordsEl.style.fontSize = CONFIG.fontSize;
}

// ─────────────────────────────────────────────────
//  Step 2 — Start Matter.js physics
// ─────────────────────────────────────────────────
function startPhysics() {
  if (effectStarted) return;
  effectStarted = true;

  const { Engine, Render, Runner, World, Bodies, Mouse, MouseConstraint, Body } = Matter;

  const width  = containerEl.offsetWidth;
  const height = containerEl.offsetHeight;

  if (width <= 0 || height <= 0) return;

  const engine = Engine.create();
  engine.gravity.y = CONFIG.gravity;

  const render = Render.create({
    element: canvasEl,
    engine,
    options: {
      width,
      height,
      background:  CONFIG.backgroundColor,
      wireframes:  CONFIG.wireframes,
    }
  });

  const bOpts = { isStatic: true, render: { fillStyle: 'transparent', strokeStyle: 'rgba(255,255,255,0.16)' } };
  const floor    = Bodies.rectangle(width / 2, height + 25, width, 50, bOpts);
  const leftWall = Bodies.rectangle(-25,        height / 2,  50, height, bOpts);
  const rightWall = Bodies.rectangle(width + 25, height / 2,  50, height, bOpts);
  const ceiling  = Bodies.rectangle(width / 2, -25,          width, 50, bOpts);

  const containerRect = containerEl.getBoundingClientRect();
  const wordSpans = wordsEl.querySelectorAll('.word-span');

  const wordBodies = [...wordSpans].map(elem => {
    const r = elem.getBoundingClientRect();
    const x = r.left - containerRect.left + r.width  / 2;
    const y = r.top  - containerRect.top  + r.height / 2;

    const body = Bodies.rectangle(x, y, r.width, r.height, {
      render:      { fillStyle: 'transparent', strokeStyle: 'rgba(255,255,255,0.22)' },
      restitution: 0.78,
      frictionAir: 0.012,
      friction:    0.2,
    });

    Body.setVelocity(body, { x: (Math.random() - 0.5) * 5, y: 0 });
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.05);

    elem.style.position = 'absolute';
    elem.style.left = `${x}px`;
    elem.style.top = `${y}px`;
    elem.style.transform = 'translate(-50%, -50%)';

    return { elem, body };
  });

  const mouse = Mouse.create(containerEl);
  const mc = MouseConstraint.create(engine, {
    mouse,
    constraint: { stiffness: CONFIG.mouseConstraintStiffness, render: { visible: false } }
  });
  render.mouse = mouse;

  World.add(engine.world, [floor, leftWall, rightWall, ceiling, mc, ...wordBodies.map(wb => wb.body)]);

  const runner = Runner.create();
  Runner.run(runner, engine);
  Render.run(render);

  function updateLoop() {
    wordBodies.forEach(({ body, elem }) => {
      const { x, y } = body.position;
      elem.style.left = `${x}px`;
      elem.style.top = `${y}px`;
      elem.style.transform = `translate(-50%, -50%) rotate(${body.angle}rad)`;
    });
    rafId = requestAnimationFrame(updateLoop);
  }
  rafId = requestAnimationFrame(updateLoop);

  matterCleanup = () => {
    cancelAnimationFrame(rafId);
    Render.stop(render);
    Runner.stop(runner);
    if (render.canvas && canvasEl.contains(render.canvas)) canvasEl.removeChild(render.canvas);
    World.clear(engine.world, false);
    Engine.clear(engine);
    matterCleanup = null;
    effectStarted = false;
  };
}

// ─────────────────────────────────────────────────
//  Trigger setup
// ─────────────────────────────────────────────────
function setupTrigger() {
  containerEl.onclick = null;
  containerEl.onmouseenter = null;
  if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }

  switch (CONFIG.trigger) {
    case 'auto':
      startPhysics();
      break;
    case 'click':
      containerEl.onclick = () => startPhysics();
      break;
    case 'hover':
      containerEl.onmouseenter = () => startPhysics();
      break;
    case 'scroll':
      scrollObserver = new IntersectionObserver(([e]) => {
        if (e.isIntersecting) { startPhysics(); scrollObserver.disconnect(); }
      }, { threshold: 0.1 });
      scrollObserver.observe(containerEl);
      break;
  }
}

// ─────────────────────────────────────────────────
//  Reset
// ─────────────────────────────────────────────────
function reset() {
  if (matterCleanup) matterCleanup();
  buildWords();
  setupTrigger();
}

// ─────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────
buildWords();
setupTrigger();

document.getElementById('resetBtn').addEventListener('click', reset);
</script>
</body>
</html>
