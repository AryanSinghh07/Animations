<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gooey Nav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      background: #080810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
    }

    /* ── Page chrome ── */
    .demo-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(168,85,247,0.6);
      text-align: center;
    }

    /* ═══════════════════════════════════════
       COLOR TOKENS used by the particles
    ═══════════════════════════════════════ */
    :root {
      --color-1: white;
      --color-2: white;
      --color-3: white;
      --color-4: white;

      /* Spring easing (copied from React source) */
      --linear-ease: linear(
        0, 0.068, 0.19 2.7%, 0.804 8.1%, 1.037,
        1.199 13.2%, 1.245, 1.27 15.8%, 1.274,
        1.272 17.4%, 1.249 19.1%, 0.996 28%, 0.949,
        0.928 33.3%, 0.926, 0.933 36.8%, 1.001 45.6%,
        1.013, 1.019 50.8%, 1.018 54.4%, 1 63.1%,
        0.995 68%, 1.001 85%, 1
      );
    }

    /* ═══════════════════════════════════════
       GOOEY NAV WRAPPER
    ═══════════════════════════════════════ */
    .gooey-nav-wrapper { position: relative; }

    /* ── Nav ── */
    .gooey-nav-wrapper nav {
      display: flex;
      position: relative;
      transform: translate3d(0, 0, 0.01px);
    }
    .gooey-nav-list {
      display: flex;
      gap: 32px;
      list-style: none;
      padding: 0 16px;
      margin: 0;
      position: relative;
      z-index: 3;
      color: white;
      text-shadow: 0 1px 1px hsl(205deg 30% 10% / 0.2);
    }
    .gooey-nav-list li {
      border-radius: 9999px;
      position: relative;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 0.5px 1.5px transparent;
    }
    .gooey-nav-list li a {
      outline: none;
      padding: 0.6em 1em;
      display: inline-block;
      text-decoration: none;
      color: inherit;
      font-size: 0.95rem;
    }

    /* Active li */
    .gooey-nav-list li.active { color: black; text-shadow: none; }
    .gooey-nav-list li.active::after { opacity: 1; transform: scale(1); }
    .gooey-nav-list li::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 8px;
      background: white;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
      z-index: -1;
    }

    /* ═══════════════════════════════════════
       EFFECT SPANS  (exact copy of React CSS)
    ═══════════════════════════════════════ */
    .effect {
      position: absolute;
      opacity: 1;
      pointer-events: none;
      display: grid;
      place-items: center;
      z-index: 1;
    }
    /* Text overlay — white initially, black when active */
    .effect.text {
      color: white;
      font-size: 0.95rem;
      transition: color 0.3s ease;
    }
    .effect.text.active { color: black; }

    /* Gooey filter element */
    .effect.filter {
      filter: blur(7px) contrast(100) blur(0);
      mix-blend-mode: lighten;
    }
    /* Black buffer behind the filter — REQUIRED for gooey to work */
    .effect.filter::before {
      content: '';
      position: absolute;
      inset: -75px;
      z-index: -2;
      background: black;
    }
    /* White pill that scales in when active */
    .effect.filter::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      transform: scale(0);
      opacity: 0;
      z-index: -1;
      border-radius: 9999px;
    }
    .effect.filter.active::after {
      animation: pill 0.3s ease both;
    }

    @keyframes pill {
      to { transform: scale(1); opacity: 1; }
    }

    /* ═══════════════════════════════════════
       PARTICLES
    ═══════════════════════════════════════ */
    .particle,
    .point {
      display: block;
      opacity: 0;
      width: 20px;
      height: 20px;
      border-radius: 9999px;
      transform-origin: center;
    }
    .particle {
      --time: 5s;
      position: absolute;
      top: calc(50% - 8px);
      left: calc(50% - 8px);
      animation: particle calc(var(--time)) ease 1 -350ms;
    }
    .point {
      background: var(--color);
      opacity: 1;
      animation: point calc(var(--time)) ease 1 -350ms;
    }

    @keyframes particle {
      0% {
        transform: rotate(0deg) translate(var(--start-x), var(--start-y));
        opacity: 1;
        animation-timing-function: cubic-bezier(0.55, 0, 1, 0.45);
      }
      70% {
        transform: rotate(calc(var(--rotate) * 0.5))
                   translate(calc(var(--end-x) * 1.2), calc(var(--end-y) * 1.2));
        opacity: 1;
        animation-timing-function: ease;
      }
      85% {
        transform: rotate(calc(var(--rotate) * 0.66))
                   translate(var(--end-x), var(--end-y));
        opacity: 1;
      }
      100% {
        transform: rotate(calc(var(--rotate) * 1.2))
                   translate(calc(var(--end-x) * 0.5), calc(var(--end-y) * 0.5));
        opacity: 1;
      }
    }

    @keyframes point {
      0% {
        transform: scale(0); opacity: 0;
        animation-timing-function: cubic-bezier(0.55, 0, 1, 0.45);
      }
      25%  { transform: scale(calc(var(--scale) * 0.25)); }
      38%  { opacity: 1; }
      65%  { transform: scale(var(--scale)); opacity: 1; animation-timing-function: ease; }
      85%  { transform: scale(var(--scale)); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- GooeyNav instance -->
  <div class="gooey-nav-wrapper" id="gooeyWrapper">
    <nav>
      <ul class="gooey-nav-list" id="gooeyNav"></ul>
    </nav>
    <span class="effect filter" id="gooeyFilter"></span>
    <span class="effect text"   id="gooeyText"></span>
  </div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG  — mirrors GooeyNavProps
// ═══════════════════════════════════════════════
const CONFIG = {
  items: [
    { label: 'Home',     href: '#' },
    { label: 'About',    href: '#' },
    { label: 'Projects', href: '#' },
    { label: 'Blog',     href: '#' },
    { label: 'Contact',  href: '#' },
  ],
  animationTime:          600,
  particleCount:          15,
  particleDistances:      [90, 10],
  particleR:              100,
  timeVariance:           300,
  colors:                 [1, 2, 3, 1, 2, 3, 1, 4],
  initialActiveIndex:     0,
};

// ═══════════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════════
const wrapperEl = document.getElementById('gooeyWrapper');
const navEl     = document.getElementById('gooeyNav');
const filterEl  = document.getElementById('gooeyFilter');
const textEl    = document.getElementById('gooeyText');

let activeIndex = CONFIG.initialActiveIndex;

// ═══════════════════════════════════════════════
//  Build nav items
// ═══════════════════════════════════════════════
CONFIG.items.forEach((item, i) => {
  const li = document.createElement('li');
  const a  = document.createElement('a');
  a.href      = item.href;
  a.textContent = item.label;

  a.addEventListener('click', e => {
    e.preventDefault();
    handleClick(li, i);
  });
  a.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleClick(li, i);
    }
  });

  li.appendChild(a);
  navEl.appendChild(li);
});

// ═══════════════════════════════════════════════
//  Helpers  (exact port of React source)
// ═══════════════════════════════════════════════
const noise = (n = 1) => n / 2 - Math.random() * n;

function getXY(distance, pointIndex, totalPoints) {
  const angle = ((360 + noise(8)) / totalPoints) * pointIndex * (Math.PI / 180);
  return [distance * Math.cos(angle), distance * Math.sin(angle)];
}

function createParticle(i, t, d, r) {
  const rotate = noise(r / 10);
  return {
    start: getXY(d[0], CONFIG.particleCount - i, CONFIG.particleCount),
    end:   getXY(d[1] + noise(7), CONFIG.particleCount - i, CONFIG.particleCount),
    time:  t,
    scale: 1 + noise(0.2),
    color: CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)],
    rotate: rotate > 0
      ? (rotate + r / 20) * 10
      : (rotate - r / 20) * 10,
  };
}

function makeParticles(element) {
  const d = CONFIG.particleDistances;
  const r = CONFIG.particleR;
  const bubbleTime = CONFIG.animationTime * 2 + CONFIG.timeVariance;
  element.style.setProperty('--time', `${bubbleTime}ms`);

  for (let i = 0; i < CONFIG.particleCount; i++) {
    const t = CONFIG.animationTime * 2 + noise(CONFIG.timeVariance * 2);
    const p = createParticle(i, t, d, r);
    element.classList.remove('active');

    setTimeout(() => {
      const particle = document.createElement('span');
      const point    = document.createElement('span');

      particle.classList.add('particle');
      particle.style.setProperty('--start-x', `${p.start[0]}px`);
      particle.style.setProperty('--start-y', `${p.start[1]}px`);
      particle.style.setProperty('--end-x',   `${p.end[0]}px`);
      particle.style.setProperty('--end-y',   `${p.end[1]}px`);
      particle.style.setProperty('--time',    `${p.time}ms`);
      particle.style.setProperty('--scale',   `${p.scale}`);
      particle.style.setProperty('--color',   `var(--color-${p.color}, white)`);
      particle.style.setProperty('--rotate',  `${p.rotate}deg`);

      point.classList.add('point');
      particle.appendChild(point);
      element.appendChild(particle);

      requestAnimationFrame(() => element.classList.add('active'));

      setTimeout(() => {
        try { element.removeChild(particle); } catch {}
      }, t);
    }, 30);
  }
}

function updateEffectPosition(element) {
  const containerRect = wrapperEl.getBoundingClientRect();
  const pos = element.getBoundingClientRect();

  const styles = {
    left:   `${pos.x - containerRect.x}px`,
    top:    `${pos.y - containerRect.y}px`,
    width:  `${pos.width}px`,
    height: `${pos.height}px`,
  };

  Object.assign(filterEl.style, styles);
  Object.assign(textEl.style,   styles);
  textEl.textContent = element.querySelector('a').textContent;
}

// ═══════════════════════════════════════════════
//  Click handler
// ═══════════════════════════════════════════════
function handleClick(liEl, index) {
  if (activeIndex === index) return;

  // Update active li
  navEl.querySelectorAll('li').forEach((li, i) => {
    li.classList.toggle('active', i === index);
  });
  activeIndex = index;

  // Reposition overlays
  updateEffectPosition(liEl);

  // Clear old particles
  filterEl.querySelectorAll('.particle').forEach(p => filterEl.removeChild(p));

  // Restart text animation
  textEl.classList.remove('active');
  void textEl.offsetWidth;          // force reflow
  textEl.classList.add('active');

  // Spawn particles
  makeParticles(filterEl);
}

// ═══════════════════════════════════════════════
//  Init: set first active item + ResizeObserver
// ═══════════════════════════════════════════════
function initActive() {
  const lis = navEl.querySelectorAll('li');
  lis[activeIndex]?.classList.add('active');
  if (lis[activeIndex]) {
    updateEffectPosition(lis[activeIndex]);
    textEl.classList.add('active');
  }
}
initActive();

const ro = new ResizeObserver(() => {
  const li = navEl.querySelectorAll('li')[activeIndex];
  if (li) updateEffectPosition(li);
});
ro.observe(wrapperEl);
</script>
</body>
</html>
