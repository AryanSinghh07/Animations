<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubble Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #1a1a1f;
      overflow-x: hidden;
    }

    /* ─── Demo page ─── */
    .demo-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .demo-hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
    }

    /* ════════════════════════════════════════
       NAV WRAPPER
    ════════════════════════════════════════ */
    .bubble-menu {
      position: fixed;
      left: 0; right: 0;
      top: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      pointer-events: none;
      z-index: 1001;
    }

    /* Shared bubble style */
    .bubble {
      pointer-events: auto;
      background: #fff;
      border-radius: 9999px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    /* Logo bubble */
    .logo-bubble {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 46px;
      padding: 0 18px;
      font-size: 0.92rem;
      font-weight: 500;
      color: #111;
      letter-spacing: -0.01em;
    }
    .logo-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    /* Toggle bubble */
    .toggle-bubble {
      width: 46px; height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    /* hamburger lines */
    .hb-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px;
      position: absolute;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .hb-line {
      width: 20px; height: 1.5px;
      background: #111; border-radius: 2px;
    }
    /* X icon */
    .x-wrap {
      position: absolute;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 0; transform: rotate(-45deg) scale(0.7);
    }
    .x-wrap svg { display: block; }

    /* Open state */
    .toggle-bubble.open .hb-wrap { opacity: 0; transform: rotate(45deg) scale(0.7); }
    .toggle-bubble.open .x-wrap  { opacity: 1; transform: rotate(0deg) scale(1); }

    /* ════════════════════════════════════════
       OVERLAY — dark bg + dot grid
    ════════════════════════════════════════ */
    .bubble-menu-items {
      position: fixed;
      inset: 0;
      display: none;          /* GSAP controls */
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1000;
      background: #1a1a1f;
      background-image: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    /* ════════════════════════════════════════
       PILL LIST  — 3-col flex-wrap
    ════════════════════════════════════════ */
    .pill-list {
      list-style: none;
      width: 100%;
      max-width: 1400px;
      padding: 0 20px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 0;
      pointer-events: auto;
    }

    .pill-col {
      flex: 0 0 calc(100% / 3);
      display: flex;
      padding: 5px 8px;
      box-sizing: border-box;
    }

    /* 4th of 5 centering (exact React source) */
    .pill-col:nth-child(4):nth-last-child(2) { margin-left: calc(100% / 6); }
    .pill-col:nth-child(4):last-child         { margin-left: calc(100% / 3); }

    /* ── Pill link ── */
    .pill-link {
      width: 100%;
      min-height: 160px;
      border-radius: 9999px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
      will-change: transform;
      /* colour fill on hover */
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Desktop: rotate + hover scale */
    @media (min-width: 900px) {
      .pill-link {
        transform: rotate(var(--item-rot));
      }
      .pill-link:hover {
        transform: rotate(var(--item-rot)) scale(1.04);
        background: var(--hover-bg) !important;
        color: var(--hover-color) !important;
      }
      .pill-link:active {
        transform: rotate(var(--item-rot)) scale(0.96);
      }
    }

    /* Mobile */
    @media (max-width: 899px) {
      .bubble-menu-items { padding-top: 110px; align-items: flex-start; }
      .pill-list { row-gap: 14px; }
      .pill-col {
        flex: 0 0 100% !important;
        margin-left: 0 !important;
        padding: 3px 8px;
      }
      .pill-link {
        min-height: 78px;
        border-radius: 9999px;
      }
      .pill-link:hover {
        transform: scale(1.04);
        background: var(--hover-bg) !important;
        color: var(--hover-color) !important;
      }
      .pill-link:active { transform: scale(0.96); }
    }

    /* Label */
    .pill-label {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1.6rem, 3.8vw, 4rem);
      font-weight: 400;
      line-height: 1;
      color: #111;
      display: inline-block;
      will-change: transform, opacity;
      transition: color 0.3s ease;
    }
    .pill-link:hover .pill-label { color: var(--hover-color, #111); }

    /* ════════════════════════════════════════
       CUSTOM CURSOR
    ════════════════════════════════════════ */
    body { cursor: none; }
    #cursor-ring {
      position: fixed; pointer-events: none; z-index: 99999;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.45);
      transform: translate(-50%, -50%);
      transition: width .2s ease, height .2s ease,
                  border-color .2s ease, opacity .3s ease,
                  background .2s ease;
      opacity: 0; mix-blend-mode: difference;
      will-change: left, top;
    }
    #cursor-dot {
      position: fixed; pointer-events: none; z-index: 100000;
      width: 5px; height: 5px; background: #fff; border-radius: 50%;
      transform: translate(-50%, -50%); opacity: 0;
      transition: opacity .3s ease, transform .1s ease;
      will-change: left, top;
    }

    /* Pill tilt on hover — handled by GSAP magnetic */
    .pill-link { cursor: none; }
    .toggle-bubble { cursor: none; }
    .logo-bubble   { cursor: none; }
  </style>
</head>
<body>

<!-- Cursor -->
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<!-- Demo page -->
<div class="demo-page">
  <p class="demo-hint">click the toggle →</p>
</div>

<!-- ── Nav ── -->
<nav class="bubble-menu" aria-label="Main navigation">

  <!-- Logo bubble -->
  <div class="bubble logo-bubble" aria-label="Logo">
    <!-- Pinwheel / asterisk icon matching React Bits -->
    <svg class="logo-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 2v7M10 11v7M2 10h7M11 10h7M4.22 4.22l4.95 4.95M10.83 10.83l4.95 4.95M15.78 4.22l-4.95 4.95M9.17 10.83 4.22 15.78" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    Animations
  </div>

  <!-- Toggle -->
  <button class="bubble toggle-bubble" id="menuToggle"
          type="button" aria-label="Toggle menu" aria-pressed="false">
    <!-- Hamburger -->
    <span class="hb-wrap">
      <span class="hb-line"></span>
      <span class="hb-line"></span>
    </span>
    <!-- X / close -->
    <span class="x-wrap">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 2l14 14M16 2 2 16" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </span>
  </button>
</nav>

<!-- ── Overlay ── -->
<div class="bubble-menu-items" id="menuOverlay" aria-hidden="true">
  <ul class="pill-list" id="pillList" role="menu" aria-label="Navigation links"></ul>
</div>

<script>
// ════════════════════════════════════════════
//  CONFIG — exact match to React Bits source
// ════════════════════════════════════════════
const animationEase     = 'back.out(1.5)';
const animationDuration = 0.5;
const staggerDelay      = 0.12;
const menuBg            = '#ffffff';
const menuContentColor  = '#111111';

const items = [
  { label: 'home',     href: '#', rotation: -8,  hoverStyles: { bgColor: '#3b82f6', textColor: '#fff' } },
  { label: 'about',    href: '#', rotation:  8,  hoverStyles: { bgColor: '#10b981', textColor: '#fff' } },
  { label: 'projects', href: '#', rotation:  8,  hoverStyles: { bgColor: '#f59e0b', textColor: '#fff' } },
  { label: 'blog',     href: '#', rotation:  8,  hoverStyles: { bgColor: '#ef4444', textColor: '#fff' } },
  { label: 'contact',  href: '#', rotation: -8,  hoverStyles: { bgColor: '#8b5cf6', textColor: '#fff' } },
];

// ════════════════════════════════════════════
//  BUILD PILLS
// ════════════════════════════════════════════
const pillList  = document.getElementById('pillList');
const bubblesRef = [];
const labelRefs  = [];

items.forEach((item, idx) => {
  const li = document.createElement('li');
  li.className = 'pill-col';
  li.setAttribute('role', 'none');

  const a = document.createElement('a');
  a.className = 'pill-link';
  a.href = item.href;
  a.setAttribute('role', 'menuitem');
  a.setAttribute('aria-label', item.label);

  a.style.setProperty('--item-rot',    `${item.rotation ?? 0}deg`);
  a.style.setProperty('--hover-bg',    item.hoverStyles?.bgColor  || '#f3f4f6');
  a.style.setProperty('--hover-color', item.hoverStyles?.textColor || menuContentColor);

  const span = document.createElement('span');
  span.className   = 'pill-label';
  span.textContent = item.label;

  a.appendChild(span);
  li.appendChild(a);
  pillList.appendChild(li);

  bubblesRef.push(a);
  labelRefs.push(span);
});

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let isMenuOpen  = false;
let showOverlay = false;

const overlay   = document.getElementById('menuOverlay');
const toggleBtn = document.getElementById('menuToggle');

// ════════════════════════════════════════════
//  GSAP ANIMATIONS
// ════════════════════════════════════════════
function runOpenAnimation() {
  gsap.set(overlay, { display: 'flex' });
  gsap.killTweensOf([...bubblesRef, ...labelRefs]);
  gsap.set(bubblesRef, { scale: 0, transformOrigin: '50% 50%' });
  gsap.set(labelRefs,  { y: 24, autoAlpha: 0 });

  const isDesktop = window.innerWidth >= 900;
  bubblesRef.forEach((el, i) => {
    gsap.set(el, { rotation: isDesktop ? (items[i].rotation ?? 0) : 0 });
  });

  bubblesRef.forEach((bubble, i) => {
    const delay = i * staggerDelay + gsap.utils.random(-0.05, 0.05);
    const tl = gsap.timeline({ delay });

    tl.to(bubble, {
      scale: 1,
      duration: animationDuration,
      ease: animationEase
    });

    if (labelRefs[i]) {
      tl.to(labelRefs[i], {
        y: 0,
        autoAlpha: 1,
        duration: animationDuration,
        ease: 'power3.out'
      }, '-=' + animationDuration * 0.9);
    }
  });
}

function runCloseAnimation() {
  gsap.killTweensOf([...bubblesRef, ...labelRefs]);

  gsap.to(labelRefs, {
    y: 24, autoAlpha: 0,
    duration: 0.2, ease: 'power3.in'
  });

  gsap.to(bubblesRef, {
    scale: 0,
    duration: 0.2,
    ease: 'power3.in',
    onComplete: () => {
      gsap.set(overlay, { display: 'none' });
      showOverlay = false;
    }
  });
}

// ════════════════════════════════════════════
//  TOGGLE
// ════════════════════════════════════════════
function handleToggle() {
  const nextState = !isMenuOpen;
  if (nextState) showOverlay = true;
  isMenuOpen = nextState;

  toggleBtn.setAttribute('aria-pressed', String(isMenuOpen));
  overlay.setAttribute('aria-hidden',    String(!isMenuOpen));
  toggleBtn.classList.toggle('open', isMenuOpen);

  if (isMenuOpen) {
    runOpenAnimation();
  } else if (showOverlay) {
    runCloseAnimation();
  }
}

toggleBtn.addEventListener('click', handleToggle);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isMenuOpen) handleToggle();
});

window.addEventListener('resize', () => {
  if (!isMenuOpen) return;
  const isDesktop = window.innerWidth >= 900;
  bubblesRef.forEach((el, i) => {
    gsap.set(el, { rotation: isDesktop ? (items[i].rotation ?? 0) : 0 });
  });
});

// ════════════════════════════════════════════
//  MOUSE INTERACTIONS
// ════════════════════════════════════════════

const ring = document.getElementById('cursor-ring');
const dot  = document.getElementById('cursor-dot');
let rx = 0, ry = 0, mx = window.innerWidth / 2, my = window.innerHeight / 2;
let cursorVisible = false;

// ── Smooth lagging ring ──
(function lagLoop() {
  rx += (mx - rx) * 0.11;
  ry += (my - ry) * 0.11;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(lagLoop);
})();

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px';
  dot.style.top  = my + 'px';
  if (!cursorVisible) {
    ring.style.opacity = '1';
    dot.style.opacity  = '1';
    cursorVisible = true;
  }
});
document.addEventListener('mouseleave', () => {
  ring.style.opacity = '0';
  dot.style.opacity  = '0';
  cursorVisible = false;
});

// ── Cursor grows on interactive elements ──
function onEnterInteractive() {
  ring.style.width       = '58px';
  ring.style.height      = '58px';
  ring.style.borderColor = 'rgba(255,255,255,0.8)';
}
function onLeaveInteractive() {
  ring.style.width       = '36px';
  ring.style.height      = '36px';
  ring.style.borderColor = 'rgba(255,255,255,0.45)';
}

// ── Magnetic pill effect ──
// When hovering a pill, it gently follows the cursor within its bounds
function addMagnetic(el, strength = 0.28) {
  el.addEventListener('mousemove', e => {
    const rect   = el.getBoundingClientRect();
    const cx     = rect.left + rect.width  / 2;
    const cy     = rect.top  + rect.height / 2;
    const dx     = (e.clientX - cx) * strength;
    const dy     = (e.clientY - cy) * strength;
    const rotVal = parseFloat(el.style.getPropertyValue('--item-rot')) || 0;
    gsap.to(el, {
      x: dx, y: dy,
      rotation: rotVal + dx * 0.04,
      duration: 0.4,
      ease: 'power2.out',
      overwrite: 'auto'
    });
  });

  el.addEventListener('mouseleave', () => {
    const rotVal = parseFloat(el.style.getPropertyValue('--item-rot')) || 0;
    gsap.to(el, {
      x: 0, y: 0,
      rotation: rotVal,
      duration: 0.55,
      ease: 'elastic.out(1, 0.6)',
      overwrite: 'auto'
    });
    onLeaveInteractive();
  });

  el.addEventListener('mouseenter', () => {
    onEnterInteractive();
    // Dot fills for a moment
    dot.style.transform = 'translate(-50%,-50%) scale(2.5)';
    setTimeout(() => { dot.style.transform = 'translate(-50%,-50%) scale(1)'; }, 200);
  });
}

// Bind magnetic to each pill
bubblesRef.forEach(el => addMagnetic(el, 0.25));

// Bind grow-only to nav bubbles (no magnetic — they're fixed to corners)
[toggleBtn, document.querySelector('.logo-bubble')].forEach(el => {
  el.addEventListener('mouseenter', onEnterInteractive);
  el.addEventListener('mouseleave', onLeaveInteractive);
});

</script>
</body>
</html>
